<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>리얼픽 — 트렌드 리서치 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #f1f5f9; font-family: 'Noto Sans KR', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useCallback } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, LineChart, Line, CartesianGrid } = Recharts;

    const PROXY = "";  // 같은 도메인이므로 공백 — /api/... 로 직접 호출

    const CATEGORIES = [
      { id: "50000000", name: "패션의류" },
      { id: "50000001", name: "패션잡화" },
      { id: "50000002", name: "화장품/미용" },
      { id: "50000003", name: "디지털/가전" },
      { id: "50000004", name: "가구/인테리어" },
      { id: "50000005", name: "출산/육아" },
      { id: "50000006", name: "식품" },
      { id: "50000007", name: "스포츠/레저" },
      { id: "50000008", name: "생활/건강" },
    ];

    const COLORS = ["#6366f1","#22d3ee","#f59e0b","#10b981","#f43f5e"];

    const callClaude = async (prompt) => {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await res.json();
      return data.content?.[0]?.text || "";
    };

    const Card = ({ children, style = {} }) => (
      <div style={{ background: "#1e293b", borderRadius: 12, padding: 20, ...style }}>
        {children}
      </div>
    );

    const Badge = ({ label, color = "#6366f1" }) => (
      <span style={{ background: color + "22", color, borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 700 }}>
        {label}
      </span>
    );

    const Spinner = () => (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: 40, gap: 12 }}>
        <div style={{ width: 36, height: 36, border: "3px solid #334155", borderTop: "3px solid #6366f1", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        <p style={{ color: "#475569", fontSize: 13 }}>불러오는 중...</p>
      </div>
    );

    const CatSelector = ({ value, onChange }) => (
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
        {CATEGORIES.map(c => (
          <button key={c.id} onClick={() => onChange(c.id)} style={{
            padding: "6px 12px", borderRadius: 8, border: "1px solid",
            borderColor: value === c.id ? "#6366f1" : "#334155",
            background: value === c.id ? "#6366f1" : "transparent",
            color: value === c.id ? "#fff" : "#94a3b8",
            fontSize: 13, cursor: "pointer"
          }}>{c.name}</button>
        ))}
      </div>
    );

    // ── TAB 1: 트렌드 분석
    function TrendTab() {
      const [catId, setCatId] = useState("50000003");
      const [keywords, setKeywords] = useState([]);
      const [selected, setSelected] = useState([]);
      const [trendData, setTrendData] = useState(null);
      const [shopData, setShopData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const fetchKw = async () => {
        setLoading(true); setError(""); setTrendData(null); setShopData(null); setSelected([]);
        try {
          const r = await fetch(`${PROXY}/api/keywords?categoryId=${catId}`);
          const d = await r.json();
          setKeywords((d.keywords || d.data || []).slice(0, 10));
        } catch(e) { setError("키워드 조회 실패: " + e.message); }
        setLoading(false);
      };

      const fetchTrend = async () => {
        if (!selected.length) return;
        setLoading(true); setError("");
        try {
          const p = selected.map(encodeURIComponent).join(",");
          const [tr, sh] = await Promise.all([
            fetch(`${PROXY}/api/trend?keywords=${p}`).then(r => r.json()),
            fetch(`${PROXY}/api/shopping?keywords=${p}&categoryId=${catId}`).then(r => r.json()),
          ]);
          setTrendData(tr); setShopData(sh);
        } catch(e) { setError("트렌드 조회 실패: " + e.message); }
        setLoading(false);
      };

      const toggle = (kw) => {
        const k = typeof kw === "string" ? kw : kw.keyword || kw.name || "";
        setSelected(prev => prev.includes(k) ? prev.filter(x => x !== k) : prev.length < 5 ? [...prev, k] : prev);
      };

      const chartData = trendData?.results?.flatMap(r =>
        (r.data||[]).map(d => ({ date: d.period, [r.title]: d.ratio }))
      ).reduce((acc, cur) => {
        const ex = acc.find(a => a.date === cur.date);
        if (ex) Object.assign(ex, cur); else acc.push({...cur});
        return acc;
      }, []) || [];

      const barData = (shopData?.results || shopData?.data || []).map(it => ({
        name: it.title || it.keyword || it.name,
        클릭수: it.data?.[it.data.length-1]?.ratio ?? it.ratio ?? 0
      }));

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card>
            <p style={{ color: "#94a3b8", fontSize: 13, marginBottom: 10 }}>카테고리 선택</p>
            <CatSelector value={catId} onChange={setCatId} />
            <button onClick={fetchKw} disabled={loading} style={{
              marginTop: 14, padding: "8px 20px", borderRadius: 8, background: "#6366f1",
              color: "#fff", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700
            }}>인기 키워드 조회</button>
          </Card>

          {keywords.length > 0 && (
            <Card>
              <p style={{ color: "#94a3b8", fontSize: 13, marginBottom: 10 }}>
                키워드 선택 (최대 5개) &nbsp;<span style={{ color: "#6366f1" }}>{selected.length}개 선택</span>
              </p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
                {keywords.map((kw, i) => {
                  const k = typeof kw === "string" ? kw : kw.keyword || kw.name || "";
                  const sel = selected.includes(k);
                  return (
                    <button key={i} onClick={() => toggle(kw)} style={{
                      padding: "6px 14px", borderRadius: 20, border: "1px solid",
                      borderColor: sel ? "#22d3ee" : "#334155",
                      background: sel ? "#22d3ee22" : "transparent",
                      color: sel ? "#22d3ee" : "#cbd5e1", fontSize: 13, cursor: "pointer"
                    }}>{k}</button>
                  );
                })}
              </div>
              <button onClick={fetchTrend} disabled={!selected.length || loading} style={{
                padding: "8px 20px", borderRadius: 8,
                background: selected.length ? "#22d3ee" : "#334155",
                color: selected.length ? "#0f172a" : "#475569",
                border: "none", cursor: selected.length ? "pointer" : "default",
                fontSize: 14, fontWeight: 700
              }}>트렌드 분석 실행</button>
            </Card>
          )}

          {loading && <Spinner />}
          {error && <Card><p style={{ color: "#f43f5e" }}>{error}</p></Card>}

          {chartData.length > 0 && (
            <Card>
              <p style={{ color: "#e2e8f0", fontWeight: 700, marginBottom: 16 }}>검색어 트렌드</p>
              <ResponsiveContainer width="100%" height={220}>
                <LineChart data={chartData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1e293b" />
                  <XAxis dataKey="date" tick={{ fill: "#64748b", fontSize: 11 }} />
                  <YAxis tick={{ fill: "#64748b", fontSize: 11 }} />
                  <Tooltip contentStyle={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 8 }} />
                  {selected.map((kw, i) => (
                    <Line key={kw} type="monotone" dataKey={kw} stroke={COLORS[i % 5]} dot={false} strokeWidth={2} />
                  ))}
                </LineChart>
              </ResponsiveContainer>
            </Card>
          )}

          {barData.length > 0 && (
            <Card>
              <p style={{ color: "#e2e8f0", fontWeight: 700, marginBottom: 16 }}>쇼핑 인사이트</p>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={barData}>
                  <XAxis dataKey="name" tick={{ fill: "#64748b", fontSize: 12 }} />
                  <YAxis tick={{ fill: "#64748b", fontSize: 11 }} />
                  <Tooltip contentStyle={{ background: "#0f172a", border: "1px solid #334155", borderRadius: 8 }} />
                  <Bar dataKey="클릭수" fill="#6366f1" radius={[6,6,0,0]} />
                </BarChart>
              </ResponsiveContainer>
            </Card>
          )}
        </div>
      );
    }

    // ── TAB 2: AI 추천
    function AITab() {
      const [catId, setCatId] = useState("50000003");
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState("");

      const run = async () => {
        setLoading(true); setError(""); setResult(null);
        try {
          const kwRes = await fetch(`${PROXY}/api/keywords?categoryId=${catId}`).then(r => r.json());
          const kws = (kwRes.keywords || kwRes.data || []).slice(0, 8)
            .map(k => typeof k === "string" ? k : k.keyword || k.name || "");

          const shRes = await fetch(`${PROXY}/api/shopping?keywords=${kws.map(encodeURIComponent).join(",")}&categoryId=${catId}`)
            .then(r => r.json());

          const catName = CATEGORIES.find(c => c.id === catId)?.name || catId;
          const prompt = `당신은 한국 이커머스 트렌드 분석 전문가입니다.
아래 네이버 쇼핑 데이터를 분석하여 JSON만 반환하세요. 마크다운, 설명 없이 JSON만.

카테고리: ${catName}
인기 키워드: ${JSON.stringify(kws)}
쇼핑 인사이트: ${JSON.stringify(shRes).slice(0, 2000)}

6가지 조건으로 필터링 후 TOP 3 추천:
1. 검색량 증가 속도(가속도 스코어) 2. 경쟁 강도 3. 구매 전환 가능성
4. 콘텐츠 제작 용이성 5. 쿠팡/네이버 수익화 가능성 6. 트렌드 지속성

반환 형식(JSON 배열, 3개):
[{"rank":1,"product":"제품명","category":"세부카테고리","speed_score":85,"phase":"급상승","success_flag":true,"reason":"추천 이유 2문장","action":"콘텐츠 액션 1줄"}]`;

          const raw = await callClaude(prompt);
          setResult(JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g, "").trim()));
        } catch(e) { setError("AI 분석 실패: " + e.message); }
        setLoading(false);
      };

      const phaseColor = { "급상승": "#22d3ee", "상승중": "#10b981", "초기": "#f59e0b", "정점": "#f43f5e" };
      const sc = s => s >= 80 ? "#10b981" : s >= 60 ? "#f59e0b" : "#f43f5e";
      const rankColor = ["#f59e0b","#94a3b8","#b45309"];

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card>
            <p style={{ color: "#94a3b8", fontSize: 13, marginBottom: 10 }}>분석 카테고리</p>
            <CatSelector value={catId} onChange={setCatId} />
            <button onClick={run} disabled={loading} style={{
              marginTop: 16, padding: "10px 28px", borderRadius: 8, background: "#6366f1",
              color: "#fff", border: "none", cursor: "pointer", fontSize: 15, fontWeight: 700, opacity: loading ? 0.7 : 1
            }}>{loading ? "AI 분석 중..." : "⚡ AI 추천 실행"}</button>
          </Card>

          {loading && (
            <Card style={{ textAlign: "center" }}>
              <Spinner />
              <p style={{ color: "#64748b", fontSize: 13 }}>네이버 데이터 수집 → Claude 분석 중...</p>
            </Card>
          )}

          {error && <Card><p style={{ color: "#f43f5e" }}>{error}</p></Card>}

          {result && result.map((item, i) => (
            <Card key={i} style={{ borderLeft: `3px solid ${rankColor[i]}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                <span style={{ fontSize: 22, fontWeight: 900, color: rankColor[i] }}>#{item.rank}</span>
                <div>
                  <p style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 16 }}>{item.product}</p>
                  <p style={{ color: "#64748b", fontSize: 12 }}>{item.category}</p>
                </div>
                <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
                  <Badge label={item.phase} color={phaseColor[item.phase] || "#6366f1"} />
                  {item.success_flag && <Badge label="✓ 성공" color="#10b981" />}
                </div>
              </div>
              <div style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ color: "#94a3b8", fontSize: 12 }}>속도 스코어</span>
                  <span style={{ color: sc(item.speed_score), fontWeight: 700, fontSize: 13 }}>{item.speed_score}점</span>
                </div>
                <div style={{ height: 6, background: "#334155", borderRadius: 3 }}>
                  <div style={{ height: "100%", borderRadius: 3, width: `${item.speed_score}%`, background: sc(item.speed_score) }} />
                </div>
              </div>
              <p style={{ color: "#cbd5e1", fontSize: 13, lineHeight: 1.6, marginBottom: 8 }}>{item.reason}</p>
              <div style={{ background: "#0f172a", borderRadius: 8, padding: "8px 12px" }}>
                <span style={{ color: "#6366f1", fontSize: 12, fontWeight: 700 }}>ACTION → </span>
                <span style={{ color: "#94a3b8", fontSize: 12 }}>{item.action}</span>
              </div>
            </Card>
          ))}
        </div>
      );
    }

    // ── TAB 3: 데이터 뷰
    function DataTab() {
      const [catId, setCatId] = useState("50000003");
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const collect = async () => {
        setLoading(true); setError("");
        try {
          const kwRes = await fetch(`${PROXY}/api/keywords?categoryId=${catId}`).then(r => r.json());
          const kws = (kwRes.keywords || kwRes.data || []).slice(0, 10)
            .map(k => typeof k === "string" ? k : k.keyword || k.name || "");
          const shRes = await fetch(`${PROXY}/api/shopping?keywords=${kws.map(encodeURIComponent).join(",")}&categoryId=${catId}`)
            .then(r => r.json());
          const items = shRes.results || shRes.data || [];
          const now = new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
          const catName = CATEGORIES.find(c => c.id === catId)?.name;
          const rows = kws.map((kw, i) => {
            const sh = items.find(it => (it.title||it.keyword||it.name) === kw);
            return { id: Date.now()+i, time: now, cat: catName, keyword: kw, ratio: sh?.data?.[sh.data.length-1]?.ratio ?? sh?.ratio ?? "-" };
          });
          setHistory(prev => [...rows, ...prev].slice(0, 50));
        } catch(e) { setError("조회 실패: " + e.message); }
        setLoading(false);
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card>
            <CatSelector value={catId} onChange={setCatId} />
            <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
              <button onClick={collect} disabled={loading} style={{
                padding: "8px 20px", borderRadius: 8, background: "#6366f1",
                color: "#fff", border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700
              }}>{loading ? "수집 중..." : "데이터 수집"}</button>
              {history.length > 0 && (
                <button onClick={() => setHistory([])} style={{
                  padding: "8px 16px", borderRadius: 8, background: "transparent",
                  color: "#64748b", border: "1px solid #334155", cursor: "pointer", fontSize: 13
                }}>초기화</button>
              )}
            </div>
          </Card>

          {loading && <Spinner />}
          {error && <Card><p style={{ color: "#f43f5e" }}>{error}</p></Card>}

          {history.length > 0 ? (
            <Card style={{ padding: 0, overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse" }}>
                <thead>
                  <tr style={{ background: "#0f172a" }}>
                    {["시간","카테고리","키워드","쇼핑 비율"].map(h => (
                      <th key={h} style={{ padding: "10px 14px", textAlign: "left", color: "#475569", fontSize: 12 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {history.map((row, i) => (
                    <tr key={row.id} style={{ borderTop: "1px solid #1e293b", background: i%2===0 ? "transparent" : "#ffffff05" }}>
                      <td style={{ padding: "9px 14px", color: "#64748b", fontSize: 12 }}>{row.time}</td>
                      <td style={{ padding: "9px 14px", color: "#94a3b8", fontSize: 12 }}>{row.cat}</td>
                      <td style={{ padding: "9px 14px", color: "#e2e8f0", fontSize: 13, fontWeight: 600 }}>{row.keyword}</td>
                      <td style={{ padding: "9px 14px", color: row.ratio !== "-" ? "#22d3ee" : "#475569", fontSize: 13, fontWeight: 700 }}>{row.ratio}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Card>
          ) : !loading && (
            <Card style={{ textAlign: "center", padding: 48 }}>
              <p style={{ color: "#334155", fontSize: 14 }}>데이터 수집 버튼을 눌러주세요</p>
            </Card>
          )}
        </div>
      );
    }

    // ── MAIN APP
    function App() {
      const [tab, setTab] = useState(0);
      const tabs = ["📊 트렌드 분석", "⚡ AI 추천", "🗂 데이터 뷰"];

      return (
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px" }}>
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
              <span style={{ fontSize: 22, fontWeight: 900, letterSpacing: -0.5 }}>리얼픽</span>
              <span style={{ background: "#6366f1", color: "#fff", fontSize: 11, padding: "2px 8px", borderRadius: 6, fontWeight: 700 }}>BETA</span>
            </div>
            <p style={{ color: "#475569", fontSize: 12 }}>realpick-proxy.vercel.app · 네이버 트렌드 실시간 분석</p>
          </div>

          <div style={{ display: "flex", gap: 4, background: "#1e293b", borderRadius: 10, padding: 4, marginBottom: 20 }}>
            {tabs.map((t, i) => (
              <button key={i} onClick={() => setTab(i)} style={{
                flex: 1, padding: "8px 0", borderRadius: 8, border: "none", cursor: "pointer",
                fontWeight: tab===i ? 700 : 400,
                background: tab===i ? "#6366f1" : "transparent",
                color: tab===i ? "#fff" : "#94a3b8",
                fontSize: 13, transition: "all .2s"
              }}>{t}</button>
            ))}
          </div>

          {tab === 0 && <TrendTab />}
          {tab === 1 && <AITab />}
          {tab === 2 && <DataTab />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
