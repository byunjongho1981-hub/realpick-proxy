<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>리얼픽 — 트렌드 리서치</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f172a;color:#f1f5f9;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .logo{font-size:36px;font-weight:900;letter-spacing:-1px;margin-bottom:6px}
    .badge{display:inline-block;background:#6366f1;color:#fff;font-size:11px;padding:2px 10px;border-radius:6px;font-weight:700;vertical-align:middle;margin-left:10px}
    .sub{color:#475569;font-size:13px;margin-bottom:48px;text-align:center}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%;max-width:720px}
    .card{background:#1e293b;border-radius:14px;padding:28px 24px;cursor:pointer;border:1px solid transparent;transition:all .2s}
    .card:hover{border-color:#6366f1;transform:translateY(-2px)}
    .card .icon{font-size:28px;margin-bottom:14px}
    .card .title{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:6px}
    .card .desc{font-size:12px;color:#64748b;line-height:1.6}
    .card .tag{display:inline-block;margin-top:14px;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700}
    .footer{margin-top:48px;color:#334155;font-size:12px;text-align:center}
    @media(max-width:600px){.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>

  <div class="logo">리얼픽 <span class="badge">BETA</span></div>
  <p class="sub">네이버 트렌드 기반 제품 선점 리서치 도구</p>

  <div class="cards">
    <div class="card">
      <div class="icon">📊</div>
      <div class="title">트렌드 분석</div>
      <div class="desc">네이버 검색어트렌드 &amp; 쇼핑인사이트 데이터를 카테고리별로 조회합니다.</div>
      <span class="tag" style="background:#6366f122;color:#6366f1">준비 중</span>
    </div>
    <div class="card">
      <div class="icon">⚡</div>
      <div class="title">AI 추천</div>
      <div class="desc">Claude AI가 트렌드 데이터를 분석해 TOP 3 제품을 추천합니다.</div>
      <span class="tag" style="background:#f59e0b22;color:#f59e0b">준비 중</span>
    </div>
    <div class="card">
      <div class="icon">🗂</div>
      <div class="title">데이터 뷰</div>
      <div class="desc">수집된 키워드와 쇼핑 비율 데이터를 테이블로 확인합니다.</div>
      <span class="tag" style="background:#22d3ee22;color:#22d3ee">준비 중</span>
    </div>
  </div>

  <div class="footer">realpick-proxy.vercel.app</div>

</body>
</html>
