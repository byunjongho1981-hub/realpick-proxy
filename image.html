<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RealPick – 이미지제작</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f4ff;color:#1e293b;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;height:60px;display:flex;align-items:center;padding:0 32px;gap:0}
    .nav-logo{font-size:18px;font-weight:900;color:#6366f1;letter-spacing:-0.5px;margin-right:36px;white-space:nowrap;text-decoration:none}
    .nav-logo span{color:#1e293b}
    .nav-links{display:flex;gap:4px}
    .nav-link{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;border:none;background:transparent;transition:all .15s;text-decoration:none;display:inline-block}
    .nav-link:hover{background:#f1f5f9;color:#1e293b}
    .nav-link.active{background:#6366f1;color:#fff;font-weight:700}
    .nav-link.hot{color:#ef4444;font-weight:700}
    .nav-link.hot:hover{background:#fef2f2}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .nav-badge{background:#6366f1;color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700}
    .main{flex:1;margin-top:60px;padding:40px 36px;max-width:1200px;margin-left:auto;margin-right:auto;width:100%}
    .section-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
    /* Upload */
    .upload-area{background:#fff;border:2px dashed #c7d2fe;border-radius:20px;padding:56px 40px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:28px;position:relative}
    .upload-area:hover,.upload-area.drag{border-color:#6366f1;background:#f5f3ff}
    .upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .upload-icon{font-size:48px;margin-bottom:16px}
    .upload-title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:8px}
    .upload-sub{font-size:13px;color:#94a3b8}
    .preview-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
    .preview-img{width:120px;height:120px;object-fit:cover;border-radius:12px;border:2px solid #e2e8f0}
    .preview-info{flex:1}
    .preview-name{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:4px}
    .preview-sub{font-size:12px;color:#94a3b8}
    .btn-reset{margin-top:10px;font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;padding:4px 0}
    /* Generate btn */
    .btn-gen{width:100%;padding:18px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:all .2s;margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-gen:hover{opacity:.9;transform:translateY(-1px)}
    .btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none}
    /* Progress */
    .progress{background:#fff;border-radius:14px;padding:20px 24px;border:1px solid #e2e8f0;margin-bottom:28px;display:none}
    .progress.show{display:block}
    .progress-label{font-size:13px;color:#64748b;margin-bottom:10px}
    .progress-bar-wrap{background:#f1f5f9;border-radius:99px;height:8px;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:99px;transition:width .4s;width:0%}
    .progress-step{font-size:11px;color:#94a3b8;margin-top:8px}
    /* Grid */
    .img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
    .img-card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;overflow:hidden;transition:all .2s}
    .img-card:hover{box-shadow:0 4px 20px #6366f120;transform:translateY(-2px)}
    .img-card.loading{opacity:.6}
    .slot-header{padding:14px 16px 10px;display:flex;align-items:center;gap:8px}
    .slot-num{width:22px;height:22px;background:#6366f1;color:#fff;border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .slot-name{font-size:13px;font-weight:700;color:#1e293b}
    .img-wrap{width:100%;aspect-ratio:1;background:#f8fafc;position:relative;overflow:hidden}
    .img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#94a3b8}
    .img-placeholder .pi-icon{font-size:32px}
    .img-placeholder .pi-text{font-size:12px}
    .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .slot-footer{padding:10px 16px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .prompt-text{font-size:10px;color:#94a3b8;line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .btn-dl{padding:5px 12px;background:#6366f1;color:#fff;font-size:11px;font-weight:700;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block}
    .btn-dl:hover{background:#4f46e5}
    .btn-dl:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
    /* error */
    .error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;color:#dc2626;font-size:13px;margin-bottom:20px;display:none}
    .error-box.show{display:block}
    @media(max-width:768px){.img-grid{grid-template-columns:1fr 1fr}.main{padding:24px 16px}}
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/index.html">Real<span>Pick</span></a>
    <div class="nav-links">
      <a class="nav-link" href="/index.html">🏠 홈</a>
      <a class="nav-link" href="/trend.html">🔍 트렌드 탐색</a>
      <a class="nav-link hot" href="/hot.html">🔥 지금 뜨는 제품</a>
      <a class="nav-link active" href="/image.html">🖼 이미지제작</a>
      <a class="nav-link" href="/blog.html">✍️ 블로그제작</a>
      <a class="nav-link" href="/data.html">🗂 데이터 뷰</a>
    </div>
    <div class="nav-right">
      <span class="nav-badge">BETA</span>
    </div>
  </nav>

  <main class="main">
    <div class="section-label">Image Studio</div>

    <!-- Upload -->
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*"/>
      <div id="uploadDefault">
        <div class="upload-icon">🖼️</div>
        <div class="upload-title">제품 원본 이미지를 업로드하세요</div>
        <div class="upload-sub">클릭 또는 드래그 &amp; 드롭 · JPG, PNG, WEBP</div>
      </div>
      <div id="uploadPreview" style="display:none">
        <div class="preview-wrap">
          <img id="previewImg" class="preview-img" src="" alt="preview"/>
          <div class="preview-info">
            <div class="preview-name" id="previewName"></div>
            <div class="preview-sub">이미지 분석 준비 완료 ✅</div>
            <button class="btn-reset" id="btnReset">✕ 다시 선택</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="error-box" id="errBox"></div>

    <!-- Generate -->
    <button class="btn-gen" id="btnGen" disabled>
      <span>🎨</span>
      <span id="btnText">이미지 업로드 후 생성 가능</span>
    </button>

    <!-- Progress -->
    <div class="progress" id="progressBox">
      <div class="progress-label" id="progressLabel">분석 중...</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-step" id="progressStep"></div>
    </div>

    <!-- Grid -->
    <div class="section-label" id="gridLabel" style="display:none">Generated Images</div>
    <div class="img-grid" id="imgGrid"></div>
  </main>

<script>
const SLOTS = [
  {num:1, name:'대표이미지',   role:'Main hero product shot on clean white background'},
  {num:2, name:'핵심구조',     role:'Core structure and key features highlighted with labels'},
  {num:3, name:'활용장면',     role:'Lifestyle usage scene — real person using the product'},
  {num:4, name:'세부디테일',   role:'Close-up detail shot showing texture and quality'},
  {num:5, name:'구성품',       role:'Flat-lay of all components and accessories included'},
  {num:6, name:'CTA직접',      role:'Eye-catching promotional banner with call-to-action text'},
];

let imgFile = null, imgB64 = null, prompts = [];

function buildPrompts(caption) {
  return [
    { slot:1, name:'대표이미지', prompt:`${caption}, on pure white background, studio lighting, 4K sharp, commercial product photography` },
    { slot:2, name:'핵심구조',   prompt:`${caption}, technical exploded-view diagram with labeled key features, clean infographic style, white background` },
    { slot:3, name:'활용장면',   prompt:`${caption}, Korean lifestyle scene with person using the product naturally, bright natural light, cozy indoor` },
    { slot:4, name:'세부디테일', prompt:`${caption}, extreme close-up macro shot showing material texture and craftsmanship, shallow depth of field` },
    { slot:5, name:'구성품',     prompt:`${caption} with all accessories, overhead flat-lay on white background, minimal product photography` },
    { slot:6, name:'CTA직접',   prompt:`${caption}, bold promotional banner design, vibrant colors, marketing visual, call-to-action style` },
  ];
}

const uploadArea = document.getElementById('uploadArea');
const fileInput  = document.getElementById('fileInput');
const uploadDefault = document.getElementById('uploadDefault');
const uploadPreview = document.getElementById('uploadPreview');
const previewImg = document.getElementById('previewImg');
const previewName= document.getElementById('previewName');
const btnReset   = document.getElementById('btnReset');
const btnGen     = document.getElementById('btnGen');
const btnText    = document.getElementById('btnText');
const progressBox= document.getElementById('progressBox');
const progressBar= document.getElementById('progressBar');
const progressLabel= document.getElementById('progressLabel');
const progressStep = document.getElementById('progressStep');
const imgGrid    = document.getElementById('imgGrid');
const gridLabel  = document.getElementById('gridLabel');
const errBox     = document.getElementById('errBox');

// Drag
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && f.type.startsWith('image/')) loadFile(f);
});
fileInput.addEventListener('change', () => { if(fileInput.files[0]) loadFile(fileInput.files[0]); });
btnReset.addEventListener('click', e => { e.stopPropagation(); resetFile(); });

function loadFile(f) {
  imgFile = f;
  const reader = new FileReader();
  reader.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    previewImg.src = ev.target.result;
    previewName.textContent = f.name;
    uploadDefault.style.display = 'none';
    uploadPreview.style.display = 'block';
    btnGen.disabled = false;
    btnText.textContent = '6장 이미지 생성하기 — Claude 분석 + Pollinations 렌더링';
    hideErr();
  };
  reader.readAsDataURL(f);
}

function resetFile() {
  imgFile = imgB64 = null;
  fileInput.value = '';
  uploadDefault.style.display = 'block';
  uploadPreview.style.display = 'none';
  btnGen.disabled = true;
  btnText.textContent = '이미지 업로드 후 생성 가능';
  imgGrid.innerHTML = '';
  gridLabel.style.display = 'none';
  progressBox.classList.remove('show');
}

function showErr(msg) { errBox.textContent = msg; errBox.classList.add('show'); }
function hideErr() { errBox.classList.remove('show'); }

function setProgress(pct, label, step='') {
  progressBar.style.width = pct + '%';
  progressLabel.textContent = label;
  progressStep.textContent = step;
}

btnGen.addEventListener('click', async () => {
  if(!imgB64) return;
  hideErr();
  btnGen.disabled = true;
  progressBox.classList.add('show');
  setProgress(10, 'Claude AI가 제품 이미지를 분석 중...', '1/3 — 이미지 인식');

  // Build skeleton cards
  gridLabel.style.display = 'block';
  imgGrid.innerHTML = SLOTS.map(s => `
    <div class="img-card loading" id="card${s.num}">
      <div class="slot-header">
        <div class="slot-num">${s.num}</div>
        <div class="slot-name">${s.name}</div>
      </div>
      <div class="img-wrap">
        <div class="img-placeholder"><div class="spinner"></div><div class="pi-text">대기 중...</div></div>
      </div>
      <div class="slot-footer">
        <div class="prompt-text" id="pt${s.num}">프롬프트 생성 중...</div>
        <button class="btn-dl" disabled id="dl${s.num}">저장</button>
      </div>
    </div>`).join('');

  // Step 1: HuggingFace BLIP — image captioning (무료, API키 불필요)
  try {
    const hfRes = await fetch(
      'https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-large',
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ inputs: imgB64 })
      }
    );
    if (!hfRes.ok) {
      const err = await hfRes.json();
      throw new Error(err.error || hfRes.statusText);
    }
    const hfData = await hfRes.json();
    const caption = hfData[0]?.generated_text || 'product';
    prompts = buildPrompts(caption);
  } catch(e) {
    showErr('HuggingFace 분석 실패: ' + e.message + ' (모델 로딩 중이면 30초 후 재시도)');
    btnGen.disabled = false;
    progressBox.classList.remove('show');
    return;
  }

  setProgress(40, 'Pollinations.ai 이미지 생성 중...', '2/3 — 이미지 렌더링 (6장)');

  // Step 2: render each
  const total = prompts.length;
  for(let i=0; i<total; i++) {
    const p = prompts[i];
    const card = document.getElementById('card'+p.slot);
    const imgWrap = card.querySelector('.img-wrap');
    const ptEl = document.getElementById('pt'+p.slot);
    const dlEl = document.getElementById('dl'+p.slot);

    ptEl.textContent = p.prompt;
    imgWrap.innerHTML = '<div class="img-placeholder"><div class="spinner"></div><div class="pi-text">생성 중...</div></div>';

    const url = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(p.prompt + ', high quality, commercial product photography') + '?width=800&height=800&nologo=true&seed=' + Math.floor(Math.random()*99999);

    await new Promise(resolve => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        imgWrap.innerHTML = '';
        imgWrap.appendChild(img);
        card.classList.remove('loading');
        dlEl.disabled = false;
        dlEl.onclick = () => downloadImg(img.src, `realpick_slot${p.slot}_${p.name}.jpg`);
        resolve();
      };
      img.onerror = () => {
        imgWrap.innerHTML = '<div class="img-placeholder"><div class="pi-icon">⚠️</div><div class="pi-text">생성 실패</div></div>';
        card.classList.remove('loading');
        resolve();
      };
      img.src = url;
      setTimeout(resolve, 30000); // 30s timeout
    });

    setProgress(40 + Math.round((i+1)/total*55), 'Pollinations.ai 이미지 생성 중...', `${i+1}/${total}장 완료`);
  }

  setProgress(100, '완료!', '6장 모두 생성되었습니다 ✅');
  setTimeout(() => progressBox.classList.remove('show'), 2000);
  btnGen.disabled = false;
  btnText.textContent = '🔄 다시 생성하기';
});

function downloadImg(src, fname) {
  const a = document.createElement('a');
  a.href = src; a.download = fname; a.target = '_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
</body>
</html>
