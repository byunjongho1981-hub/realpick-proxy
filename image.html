<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RealPick – 이미지제작</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f4ff;color:#1e293b;font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;height:60px;display:flex;align-items:center;padding:0 32px}
    .nav-logo{font-size:18px;font-weight:900;color:#6366f1;letter-spacing:-0.5px;margin-right:36px;text-decoration:none}
    .nav-logo span{color:#1e293b}
    .nav-links{display:flex;gap:4px}
    .nav-link{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#64748b;cursor:pointer;border:none;background:transparent;transition:all .15s;text-decoration:none}
    .nav-link:hover{background:#f1f5f9;color:#1e293b}
    .nav-link.active{background:#6366f1;color:#fff;font-weight:700}
    .nav-link.hot{color:#ef4444;font-weight:700}
    .nav-link.hot:hover{background:#fef2f2}
    .nav-right{margin-left:auto}
    .nav-badge{background:#6366f1;color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700}
    .main{flex:1;margin-top:60px;padding:40px 36px;max-width:1200px;margin-left:auto;margin-right:auto;width:100%}
    .section-label{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
    .upload-box{background:#fff;border:2px dashed #c7d2fe;border-radius:20px;margin-bottom:20px;overflow:hidden;transition:all .2s}
    .upload-box.drag{border-color:#6366f1;background:#f5f3ff}
    .upload-trigger{padding:48px 40px;text-align:center;position:relative}
    .upload-trigger input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:5}
    .upload-trigger:hover{background:#f8f7ff}
    .upload-icon{font-size:44px;margin-bottom:12px;pointer-events:none}
    .upload-title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:6px;pointer-events:none}
    .upload-sub{font-size:13px;color:#94a3b8;pointer-events:none}
    .upload-cta{display:inline-block;margin-top:14px;padding:10px 28px;background:#6366f1;color:#fff;border-radius:10px;font-size:13px;font-weight:700;pointer-events:none}
    .preview-area{padding:24px 40px;display:flex;align-items:center;gap:24px}
    .preview-img{width:100px;height:100px;object-fit:cover;border-radius:12px;border:2px solid #e2e8f0;flex-shrink:0}
    .p-name{font-size:14px;font-weight:600;color:#1e293b;margin-bottom:4px}
    .p-sub{font-size:12px;color:#94a3b8}
    .btn-reset{margin-top:8px;font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;padding:0}
    .product-box{background:#eff0ff;border:1.5px solid #c7d2fe;border-radius:12px;padding:12px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
    .product-input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;outline:none;font-family:inherit;margin-bottom:16px;background:#fff}
    .product-input:focus{border-color:#6366f1}
    .slot-select{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:16px 20px;margin-bottom:20px}
    .slot-select-title{font-size:12px;font-weight:700;color:#64748b;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .slot-checks{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
    .slot-check{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
    .slot-check input{display:none}
    .slot-check-box{width:44px;height:44px;border-radius:10px;border:2px solid #e2e8f0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#94a3b8;transition:all .15s;background:#f8fafc}
    .slot-check input:checked ~ .slot-check-box{border-color:#6366f1;background:#6366f1;color:#fff}
    .slot-check-lbl{font-size:9px;color:#94a3b8;text-align:center;line-height:1.4;font-weight:600}
    .slot-check input:checked ~ .slot-check-lbl{color:#6366f1;font-weight:700}
    .error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px 18px;color:#dc2626;font-size:13px;margin-bottom:16px;display:none}
    .error-box.show{display:block}
    .btn-gen{width:100%;padding:18px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:15px;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:all .2s;margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:10px}
    .btn-gen:hover{opacity:.9;transform:translateY(-1px)}
    .btn-gen:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .progress{background:#fff;border-radius:14px;padding:20px 24px;border:1px solid #e2e8f0;margin-bottom:24px;display:none}
    .progress.show{display:block}
    .progress-label{font-size:13px;color:#64748b;margin-bottom:10px}
    .progress-bar-wrap{background:#f1f5f9;border-radius:99px;height:8px;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:99px;transition:width .4s;width:0%}
    .progress-step{font-size:11px;color:#94a3b8;margin-top:8px}
    .img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
    .img-card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;overflow:hidden;transition:all .2s}
    .img-card:hover{box-shadow:0 4px 20px #6366f120;transform:translateY(-2px)}
    .img-card.loading{opacity:.6}
    .slot-header{padding:14px 16px 10px;display:flex;align-items:center;gap:8px}
    .slot-num{width:22px;height:22px;background:#6366f1;color:#fff;border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .slot-name{font-size:13px;font-weight:700;color:#1e293b}
    .img-wrap{width:100%;aspect-ratio:1;background:#f8fafc;overflow:hidden;cursor:zoom-in}
    .img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#94a3b8}
    .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .slot-footer{padding:10px 16px 14px;display:flex;align-items:center;gap:6px}
    .prompt-text{font-size:10px;color:#94a3b8;line-height:1.5;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    .btn-regen{padding:5px 10px;background:#f1f5f9;color:#64748b;font-size:11px;font-weight:700;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;flex-shrink:0}
    .btn-regen:hover{background:#e2e8f0}
    .btn-regen:disabled{opacity:.4;cursor:not-allowed}
    .btn-dl{padding:5px 12px;background:#6366f1;color:#fff;font-size:11px;font-weight:700;border:none;border-radius:8px;cursor:pointer;flex-shrink:0}
    .btn-dl:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal-img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:12px}
    .modal-info{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;text-align:center;max-width:560px;line-height:1.6;pointer-events:none}
    .modal-close{position:fixed;top:20px;right:24px;color:#fff;font-size:22px;cursor:pointer;background:rgba(255,255,255,.15);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center}
    @media(max-width:768px){.img-grid{grid-template-columns:1fr 1fr}.main{padding:24px 16px}.slot-checks{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/index.html">Real<span>Pick</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/index.html">🏠 홈</a>
    <a class="nav-link" href="/trend.html">🔍 트렌드 탐색</a>
    <a class="nav-link hot" href="/hot.html">🔥 지금 뜨는 제품</a>
    <a class="nav-link active" href="/image.html">🖼 이미지제작</a>
    <a class="nav-link" href="/blog.html">✍️ 블로그제작</a>
    <a class="nav-link" href="/data.html">🗂 데이터 뷰</a>
  </div>
  <div class="nav-right"><span class="nav-badge">BETA</span></div>
</nav>

<main class="main">
  <div class="section-label">Image Studio</div>

  <!-- 제품명 연결됨 표시 -->
  <div id="productBox" class="product-box" style="display:none">
    <span style="font-size:13px;color:#6366f1;font-weight:700">📦 연결된 제품:</span>
    <span id="productBoxName" style="font-size:14px;font-weight:800;color:#1e293b"></span>
    <button onclick="clearProduct()" style="margin-left:auto;font-size:11px;color:#94a3b8;background:none;border:none;cursor:pointer">✕ 해제</button>
  </div>

  <!-- 제품명 입력 -->
  <input id="productName" class="product-input" type="text" placeholder="제품명 입력 (예: 티티카카 스트림 P7 접이식 자전거) — 없어도 됩니다"/>

  <!-- 업로드 2분할 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <!-- 제품 이미지 -->
    <div class="upload-box" id="uploadBox">
      <div id="uploadTrigger" class="upload-trigger">
        <input type="file" id="fileInput" accept="image/*"/>
        <div class="upload-icon">📦</div>
        <div class="upload-title" style="font-size:14px">제품 이미지 업로드</div>
        <div class="upload-sub">쿠팡·네이버 대표 이미지</div>
        <div class="upload-cta">파일 선택</div>
      </div>
      <div id="previewArea" class="preview-area" style="display:none">
        <img id="previewImg" class="preview-img" src="" alt=""/>
        <div>
          <div class="p-name" id="previewName"></div>
          <div class="p-sub">✔ 제품은 절대 변형되지 않음</div>
          <button class="btn-reset" id="btnReset">✕ 다시 선택</button>
        </div>
      </div>
    </div>
    <!-- 캐릭터 이미지 -->
    <div class="upload-box" id="charBox">
      <div id="charTrigger" class="upload-trigger">
        <input type="file" id="charInput" accept="image/*"/>
        <div class="upload-icon">👤</div>
        <div class="upload-title" style="font-size:14px">캐릭터 이미지 업로드</div>
        <div class="upload-sub">고정 캐릭터 이미지 (선택)</div>
        <div class="upload-cta">파일 선택</div>
      </div>
      <div id="charPreviewArea" class="preview-area" style="display:none">
        <img id="charPreviewImg" class="preview-img" src="" alt=""/>
        <div>
          <div class="p-name" id="charPreviewName"></div>
          <div class="p-sub">✔ 캐릭터는 항상 동일 유지</div>
          <button class="btn-reset" id="btnCharReset">✕ 다시 선택</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 슬롯 선택 -->
  <div class="slot-select">
    <div class="slot-select-title">
      <span>🎯 생성할 장면 선택</span>
      <div style="display:flex;gap:8px">
        <button onclick="selectAll(true)" style="font-size:11px;padding:3px 10px;background:#6366f1;color:#fff;border:none;border-radius:6px;cursor:pointer">전체선택</button>
        <button onclick="selectAll(false)" style="font-size:11px;padding:3px 10px;background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer">전체해제</button>
      </div>
    </div>
    <div class="slot-checks">
      <label class="slot-check"><input type="checkbox" class="slot-chk" value="1" checked/><div class="slot-check-box">1</div><div class="slot-check-lbl">문제<br/>상황</div></label>
      <label class="slot-check"><input type="checkbox" class="slot-chk" value="2" checked/><div class="slot-check-box">2</div><div class="slot-check-lbl">기존<br/>한계</div></label>
      <label class="slot-check"><input type="checkbox" class="slot-chk" value="3" checked/><div class="slot-check-box">3</div><div class="slot-check-lbl">제품<br/>등장</div></label>
      <label class="slot-check"><input type="checkbox" class="slot-chk" value="4" checked/><div class="slot-check-box">4</div><div class="slot-check-lbl">사용<br/>장면</div></label>
      <label class="slot-check"><input type="checkbox" class="slot-chk" value="5" checked/><div class="slot-check-box">5</div><div class="slot-check-lbl">결과<br/>변화</div></label>
      <label class="slot-check"><input type="checkbox" class="slot-chk" value="6" checked/><div class="slot-check-box">6</div><div class="slot-check-lbl">라이프<br/>스타일</div></label>
    </div>
  </div>

  <div class="error-box" id="errBox"></div>

  <button class="btn-gen" id="btnGen" disabled>
    <span>🎨</span><span id="btnText">이미지 업로드 후 생성 가능</span>
  </button>

  <div class="progress" id="progressBox">
    <div class="progress-label" id="progressLabel">분석 중...</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-step" id="progressStep"></div>
  </div>

  <div class="section-label" id="gridLabel" style="display:none">Generated Images</div>
  <div class="img-grid" id="imgGrid"></div>
</main>

<!-- 전체화면 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img class="modal-img" id="modalImg" src="" alt=""/>
  <div class="modal-info" id="modalInfo"></div>
</div>

<script>
const SLOT_NAMES = {1:'문제상황',2:'기존한계',3:'제품등장',4:'사용장면',5:'결과변화',6:'라이프스타일'};
let imgFile = null, imgB64 = null, charFile = null, charB64 = null, prompts = [];

// ── DOM refs ──
const fileInput   = document.getElementById('fileInput');
const uploadBox   = document.getElementById('uploadBox');
const uploadTrigger = document.getElementById('uploadTrigger');
const previewArea = document.getElementById('previewArea');
const previewImg  = document.getElementById('previewImg');
const previewName = document.getElementById('previewName');
const btnReset    = document.getElementById('btnReset');
const btnGen      = document.getElementById('btnGen');
const btnText     = document.getElementById('btnText');
const progressBox = document.getElementById('progressBox');
const progressBar = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const progressStep  = document.getElementById('progressStep');
const imgGrid     = document.getElementById('imgGrid');
const gridLabel   = document.getElementById('gridLabel');
const errBox      = document.getElementById('errBox');

// ── 초기화: sessionStorage 복원 ──
(function init() {
  const name = sessionStorage.getItem('image-product-name');
  if (name) {
    document.getElementById('productBox').style.display = 'flex';
    document.getElementById('productBoxName').textContent = name;
    document.getElementById('productName').value = name;
    sessionStorage.removeItem('image-product-name');
  }
  try {
    const saved = JSON.parse(sessionStorage.getItem('image-result') || 'null');
    if (saved && saved.length) restoreCards(saved);
  } catch(e) {}
})();

function restoreCards(cards) {
  gridLabel.style.display = 'block';
  imgGrid.innerHTML = cards.map(p => `
    <div class="img-card" id="card${p.slot}">
      <div class="slot-header"><div class="slot-num">${p.slot}</div><div class="slot-name">${p.name}</div></div>
      <div class="img-wrap">${p.src ? `<img src="${p.src}"/>` : '<div class="img-placeholder">⚠️</div>'}</div>
      <div class="slot-footer">
        <div class="prompt-text">${p.short_copy ? `"${p.short_copy}"` : (p.prompt||'')}</div>
        <button class="btn-regen" id="regen${p.slot}">↺</button>
        <button class="btn-dl" id="dl${p.slot}" ${p.src?'':'disabled'}>저장</button>
      </div>
    </div>`).join('');
  cards.forEach(p => {
    const regenEl = document.getElementById('regen'+p.slot);
    if (regenEl) regenEl.onclick = () => regenSlot(p);
    if (!p.src) return;
    const dlEl = document.getElementById('dl'+p.slot);
    if (dlEl) dlEl.onclick = () => dlFile(p.src, p.slot, p.name);
    const imgEl = document.querySelector(`#card${p.slot} .img-wrap img`);
    if (imgEl) imgEl.onclick = () => openModal(p.src, p.short_copy ? `"${p.short_copy}"` : p.name);
  });
  btnText.textContent = '🔄 다시 생성하기';
}

// ── 파일 업로드 ──
fileInput.onchange = function() {
  if (this.files && this.files[0]) loadFile(this.files[0]);
};

// 캐릭터 업로드
document.getElementById('charInput').onchange = function() {
  if (this.files && this.files[0]) loadCharFile(this.files[0]);
};
document.getElementById('btnCharReset').onclick = function() {
  document.getElementById('charInput').value = '';
  charFile = charB64 = null;
  document.getElementById('charTrigger').style.display = 'block';
  document.getElementById('charPreviewArea').style.display = 'none';
};
function loadCharFile(f) {
  charFile = f;
  const reader = new FileReader();
  reader.onload = ev => {
    charB64 = ev.target.result.split(',')[1];
    document.getElementById('charPreviewImg').src = ev.target.result;
    document.getElementById('charPreviewName').textContent = f.name;
    document.getElementById('charTrigger').style.display = 'none';
    document.getElementById('charPreviewArea').style.display = 'flex';
  };
  reader.readAsDataURL(f);
}

// 드래그 앤 드롭 (캐릭터)
const charBox = document.getElementById('charBox');
charBox.addEventListener('dragover', e => { e.preventDefault(); charBox.classList.add('drag'); });
charBox.addEventListener('dragleave', () => charBox.classList.remove('drag'));
charBox.addEventListener('drop', e => {
  e.preventDefault(); charBox.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadCharFile(f);
});
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag'));
uploadBox.addEventListener('drop', e => {
  e.preventDefault(); uploadBox.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

btnReset.onclick = function() {
  fileInput.value = '';
  imgFile = imgB64 = null;
  uploadTrigger.style.display = 'block';
  previewArea.style.display = 'none';
  btnGen.disabled = true;
  btnText.textContent = '이미지 업로드 후 생성 가능';
};

function loadFile(f) {
  imgFile = f;
  const reader = new FileReader();
  reader.onload = ev => {
    imgB64 = ev.target.result.split(',')[1];
    previewImg.src = ev.target.result;
    previewName.textContent = f.name;
    uploadTrigger.style.display = 'none';
    previewArea.style.display = 'flex';
    btnGen.disabled = false;
    btnText.textContent = '이미지 생성하기 — Gemini 분석 + Gemini 이미지 생성';
    errBox.classList.remove('show');
  };
  reader.readAsDataURL(f);
}

// ── 슬롯 선택 ──
function selectAll(v) { document.querySelectorAll('.slot-chk').forEach(c => c.checked = v); }
function getSelected() { return [...document.querySelectorAll('.slot-chk:checked')].map(c => +c.value); }

// ── 제품명 ──
function clearProduct() {
  document.getElementById('productBox').style.display = 'none';
  document.getElementById('productName').value = '';
}
function getProductName() { return document.getElementById('productName').value.trim(); }

// ── 유틸 ──
function setProgress(pct, label, step='') {
  progressBar.style.width = pct+'%';
  progressLabel.textContent = label;
  progressStep.textContent = step;
}
function dlFile(src, slot, name) {
  const a = document.createElement('a');
  a.href = src; a.download = `realpick_${slot}_${name}.png`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function openModal(src, info) {
  document.getElementById('modalImg').src = src;
  document.getElementById('modalInfo').textContent = info || '';
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── 단일 슬롯 재생성 ──
async function regenSlot(p) {
  const card = document.getElementById('card'+p.slot);
  const imgWrap = card.querySelector('.img-wrap');
  const regenEl = document.getElementById('regen'+p.slot);
  const dlEl = document.getElementById('dl'+p.slot);
  regenEl.disabled = true; regenEl.textContent = '...';
  imgWrap.innerHTML = '<div class="img-placeholder"><div class="spinner"></div></div>';
  try {
    const r = await fetch('/api/generate-image', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ prompt: p.prompt+', seed:'+Math.floor(Math.random()*99999) })
    });
    const d = await r.json();
    if (!r.ok || !d.base64) throw new Error(d.error||'이미지 없음');
    const src = `data:${d.mimeType};base64,${d.base64}`;
    const img = new Image();
    img.onload = () => {
      imgWrap.innerHTML = ''; imgWrap.appendChild(img);
      img.onclick = () => openModal(src, p.short_copy ? `"${p.short_copy}"` : p.name);
      dlEl.disabled = false;
      dlEl.onclick = () => dlFile(src, p.slot, p.name);
      try {
        const saved = JSON.parse(sessionStorage.getItem('image-result')||'[]');
        const idx = saved.findIndex(c=>c.slot===p.slot);
        if(idx>=0) saved[idx].src = src;
        sessionStorage.setItem('image-result', JSON.stringify(saved));
      } catch(e){}
    };
    img.src = src;
  } catch(e) {
    imgWrap.innerHTML = `<div class="img-placeholder"><div style="font-size:20px">⚠️</div><div style="font-size:11px">${e.message}</div></div>`;
  }
  regenEl.disabled = false; regenEl.textContent = '↺';
}

// ── 메인 생성 ──
btnGen.addEventListener('click', async () => {
  if (!imgB64) return;
  const selected = getSelected();
  if (!selected.length) {
    errBox.textContent = '⚠️ 최소 1개 이상 선택하세요';
    errBox.classList.add('show'); return;
  }
  errBox.classList.remove('show');
  btnGen.disabled = true;
  progressBox.classList.add('show');
  setProgress(10, 'Gemini가 제품 이미지를 분석 중...', '1/2 — 이미지 인식');

  // 스켈레톤
  gridLabel.style.display = 'block';
  imgGrid.innerHTML = selected.map(num => `
    <div class="img-card loading" id="card${num}">
      <div class="slot-header"><div class="slot-num">${num}</div><div class="slot-name">${SLOT_NAMES[num]}</div></div>
      <div class="img-wrap"><div class="img-placeholder"><div class="spinner"></div><div style="font-size:12px">대기 중...</div></div></div>
      <div class="slot-footer">
        <div class="prompt-text" id="pt${num}">프롬프트 생성 중...</div>
        <button class="btn-regen" disabled id="regen${num}">↺</button>
        <button class="btn-dl" disabled id="dl${num}">저장</button>
      </div>
    </div>`).join('');

  // Step1: 분석
  try {
    const res = await fetch('/api/analyze-image', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ imageBase64:imgB64, mediaType:imgFile.type||'image/jpeg', productName:getProductName() })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error||res.statusText);
    prompts = data.prompts;
  } catch(e) {
    errBox.textContent = '분석 실패: '+e.message;
    errBox.classList.add('show');
    btnGen.disabled = false;
    progressBox.classList.remove('show');
    return;
  }

  // Step2: 이미지 생성
  const filtered = prompts.filter(p => selected.includes(p.slot));
  setProgress(40, 'Gemini 이미지 생성 중...', `2/2 — 렌더링 (${filtered.length}장)`);

  for (let i=0; i<filtered.length; i++) {
    const p = filtered[i];
    const card = document.getElementById('card'+p.slot);
    const imgWrap = card.querySelector('.img-wrap');
    const ptEl = document.getElementById('pt'+p.slot);
    const dlEl = document.getElementById('dl'+p.slot);
    const regenEl = document.getElementById('regen'+p.slot);

    ptEl.textContent = p.short_copy ? `"${p.short_copy}"` : p.prompt;
    imgWrap.innerHTML = '<div class="img-placeholder"><div class="spinner"></div></div>';

    await (async () => {
      try {
        const r = await fetch('/api/generate-image', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ prompt: p.prompt+', high quality, commercial product photography, seed:'+Math.floor(Math.random()*99999) })
        });
        const d = await r.json();
        if (!r.ok || !d.base64) throw new Error(d.error||'이미지 없음');
        const src = `data:${d.mimeType};base64,${d.base64}`;
        const img = new Image();
        img.onload = () => {
          imgWrap.innerHTML = ''; imgWrap.appendChild(img);
          card.classList.remove('loading');
          img.onclick = () => openModal(src, p.short_copy ? `"${p.short_copy}"` : p.name);
          dlEl.disabled = false; dlEl.onclick = () => dlFile(src, p.slot, p.name);
          regenEl.disabled = false; regenEl.onclick = () => regenSlot(p);
        };
        img.src = src;
      } catch(e) {
        imgWrap.innerHTML = `<div class="img-placeholder"><div style="font-size:20px">⚠️</div><div style="font-size:11px">${e.message}</div></div>`;
        card.classList.remove('loading');
      }
    })();

    setProgress(40+Math.round((i+1)/filtered.length*58), 'Gemini 이미지 생성 중...', `${i+1}/${filtered.length}장 완료`);
  }

  setProgress(100, '완료!', `${filtered.length}장 생성 완료 ✅`);
  setTimeout(()=>progressBox.classList.remove('show'), 2500);
  btnGen.disabled = false;
  btnText.textContent = '🔄 다시 생성하기';

  // sessionStorage 저장
  try {
    const cards = filtered.map(p => {
      const imgEl = document.querySelector(`#card${p.slot} .img-wrap img`);
      return { slot:p.slot, name:p.name, prompt:p.prompt, short_copy:p.short_copy||'', src:imgEl?imgEl.src:'' };
    });
    sessionStorage.setItem('image-result', JSON.stringify(cards));
  } catch(e) {}
});
</script>
