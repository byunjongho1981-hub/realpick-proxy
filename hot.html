<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>지금 뜨는 제품 — RealPick</title>
<style>
:root{
  --bg:#fff5f5;--surf:#fff;--bdr:#e2e8f0;
  --txt:#1e293b;--muted:#64748b;--faint:#94a3b8;
  --pri:#ef4444;--pri-lt:#fef2f2;--pri-bdr:#fecaca;
  --rising:#10b981;--rising-lt:#ecfdf5;
  --stable:#6366f1;--stable-lt:#eff0ff;
  --falling:#f43f5e;--falling-lt:#fff1f2;
  --new:#f59e0b;--new-lt:#fffbeb;
  --ga:#10b981;--ga-lt:#ecfdf5;
  --gb:#6366f1;--gb-lt:#eff0ff;
  --gc:#94a3b8;--gc-lt:#f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:13px}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);height:52px;display:flex;align-items:center;padding:0 24px}
.nav-logo{font-size:16px;font-weight:900;color:#6366f1;text-decoration:none;margin-right:28px}
.nav-logo span{color:var(--txt)}
.nav-links{display:flex;gap:2px}
.nav-link{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:500;color:var(--faint);text-decoration:none;transition:all .15s}
.nav-link:hover{background:#f1f5f9;color:var(--txt)}
.nav-link.active{background:var(--pri);color:#fff;font-weight:700}
.nav-right{margin-left:auto}
.badge{background:#ef4444;color:#fff;font-size:10px;padding:2px 9px;border-radius:20px;font-weight:700}
.page{margin-top:52px;padding:24px;max-width:960px;margin-left:auto;margin-right:auto}
.search-box{background:#fff;border-radius:16px;padding:24px 28px;border:1px solid var(--pri-bdr);margin-bottom:20px;box-shadow:0 4px 20px rgba(239,68,68,.08)}
.search-title{font-size:18px;font-weight:900;color:var(--txt);margin-bottom:4px}
.search-sub{font-size:12px;color:var(--muted);margin-bottom:16px}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{flex:1;padding:10px 16px;border:2px solid var(--pri-bdr);border-radius:12px;font-size:14px;outline:none;background:#fff;color:var(--txt);transition:border-color .15s}
.search-input:focus{border-color:var(--pri)}
.search-btn{padding:10px 24px;background:var(--pri);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .15s}
.search-btn:hover{background:#dc2626}
.search-btn:disabled{opacity:.5;cursor:not-allowed}
.result-wrap{background:#fff;border-radius:16px;border:1px solid var(--bdr);overflow:hidden}
.result-hdr{padding:14px 20px;background:#f8fafc;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#475569;background:#f1f5f9;padding:2px 9px;border-radius:20px;font-weight:600}
.result-list{padding:12px}
.r-item{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .2s;position:relative}
.r-item:hover{border-color:var(--pri);box-shadow:0 2px 12px rgba(239,68,68,.1)}
.r-item:last-child{margin-bottom:0}
.r-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.r-rank{width:28px;height:28px;border-radius:8px;background:var(--pri-lt);color:var(--pri);font-size:13px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.r-name{font-size:15px;font-weight:800;flex:1}
.r-score{font-size:20px;font-weight:900;color:var(--pri)}
.r-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.bdg{display:inline-flex;align-items:center;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap}
.r-reason{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.r-links{display:flex;gap:6px;flex-wrap:wrap}
.r-link{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f8fafc;border:1px solid var(--bdr);border-radius:7px;text-decoration:none;font-size:11px;font-weight:600;color:#475569;transition:all .15s}
.r-link:hover{border-color:#6366f1;color:#6366f1}
.r-link.hot{background:var(--pri-lt);border-color:var(--pri-bdr);color:var(--pri)}
.empty-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--faint);gap:10px;text-align:center}
.err-box{background:#fef2f2;border:1px solid #fecaca;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:8px;font-size:13px;color:#dc2626;margin:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid var(--bdr);border-top:3px solid var(--pri);border-radius:50%;animation:spin .8s linear infinite}
.loading-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/index.html">Real<span>Pick</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/index.html">🏠 홈</a>
    <a class="nav-link" href="/trend.html">🔍 트렌드 탐색</a>
    <a class="nav-link active" href="/hot.html">🔥 지금 뜨는 제품</a>
    <a class="nav-link" href="/ai.html">⚡ AI 추천</a>
    <a class="nav-link" href="/data.html">🗂 데이터 뷰</a>
  </div>
  <div class="nav-right"><span class="badge">HOT</span></div>
</nav>

<div class="page">
  <div class="search-box">
    <div class="search-title">🔥 지금 뜨는 제품</div>
    <div class="search-sub">키워드를 입력하면 네이버 쇼핑 트렌드 기반으로 연관 급상승 제품을 분석합니다</div>
    <div class="search-row">
      <input id="hot-input" class="search-input" type="text" placeholder="예: 스마트폰, 캠핑텐트, 무선이어폰..." maxlength="30"
        onkeydown="if(event.key==='Enter')runHot()"/>
      <button id="hot-btn" class="search-btn" onclick="runHot()">🔥 검색</button>
    </div>
  </div>

  <div class="result-wrap">
    <div class="result-hdr" id="result-hdr">
      <span class="chip" style="color:var(--faint)">키워드를 입력하고 검색하세요</span>
    </div>
    <div id="result-body">
      <div class="empty-box">
        <div style="font-size:40px">🔥</div>
        <div style="font-weight:700">지금 뜨는 제품을 찾아보세요</div>
        <div style="font-size:11px;color:#c4cad4">키워드 입력 → 네이버 쇼핑 트렌드 분석</div>
      </div>
    </div>
  </div>
</div>

<script>
var TREND_LBL={rising:'🔥 급상승',stable:'➡️ 보합',falling:'📉 하락',new:'✨ 신규',unknown:'❓ 보류'};
var TREND_C={rising:'#10b981',stable:'#6366f1',falling:'#f43f5e',new:'#f59e0b',unknown:'#94a3b8'};
var TREND_BG={rising:'#ecfdf5',stable:'#eff0ff',falling:'#fff1f2',new:'#fffbeb',unknown:'#f8fafc'};
var GRADE_C={A:'#10b981',B:'#6366f1',C:'#94a3b8'};
var GRADE_BG={A:'#ecfdf5',B:'#eff0ff',C:'#f8fafc'};

function bdg(txt,c,bg){return '<span class="bdg" style="color:'+c+';background:'+bg+'">'+txt+'</span>';}
function n(v){var x=Number(v);return isNaN(x)?0:x;}
function fmtDate(iso){try{return new Date(iso).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}

function setLoading(on){
  var btn=document.getElementById('hot-btn');
  var inp=document.getElementById('hot-input');
  btn.disabled=on;
  inp.disabled=on;
  if(on){
    document.getElementById('result-body').innerHTML='<div class="loading-box"><div class="spinner"></div><div>🔥 트렌드 분석 중...</div></div>';
    document.getElementById('result-hdr').innerHTML='<span class="chip" style="color:var(--faint)">분석 중...</span>';
  }
}

function showErr(msg){
  document.getElementById('result-body').innerHTML='<div class="err-box"><span>⚠️</span><span>'+msg+'</span><button onclick="runHot()" style="margin-left:auto;padding:5px 12px;background:#f1f5f9;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700">재시도</button></div>';
  document.getElementById('result-hdr').innerHTML='<span class="chip" style="color:#ef4444">오류 발생</span>';
}

function runHot(){
  var kw=document.getElementById('hot-input').value.trim();
  if(!kw){document.getElementById('hot-input').focus();return;}
  setLoading(true);
  fetch('/api/auto-discover?mode=seed&keyword='+encodeURIComponent(kw)+'&period=today')
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data||!Array.isArray(data.candidates))throw new Error('응답 형식 오류');
      renderResults(kw, data);
    })
    .catch(function(e){showErr(e.message||'오류가 발생했습니다');})
    .finally(function(){setLoading(false);});
}

function renderResults(kw, data){
  var candidates=data.candidates||[];
  var updatedAt=data.updatedAt||'';

  // 헤더
  var rising=candidates.filter(function(c){return c&&c.trend&&c.trend.status==='rising';});
  var aGrade=candidates.filter(function(c){return c&&c.score&&c.score.grade==='A';});
  document.getElementById('result-hdr').innerHTML=
    '<span class="chip">🔍 "'+kw+'"</span>'
    +'<span class="chip">📦 '+candidates.length+'개</span>'
    +'<span class="chip" style="color:#10b981">🔥 급상승 '+rising.length+'개</span>'
    +'<span class="chip" style="color:#10b981">🏆 A등급 '+aGrade.length+'개</span>'
    +(updatedAt?'<span class="chip" style="margin-left:auto;color:var(--faint)">🕐 '+fmtDate(updatedAt)+'</span>':'');

  if(!candidates.length){
    document.getElementById('result-body').innerHTML='<div class="empty-box"><div style="font-size:36px">😶</div><div>관련 제품을 찾지 못했습니다</div><div style="font-size:11px;color:#c4cad4">다른 키워드로 검색해보세요</div></div>';
    return;
  }

  document.getElementById('result-body').innerHTML='<div class="result-list">'
    +candidates.map(function(c,i){
      if(!c)return'';
      var sc=c.score||{},tr=c.trend||{};
      var gc=GRADE_C[sc.grade]||'#94a3b8';
      var reason=c.reason?c.reason.split(' · ').slice(0,3).join(' · '):'';
      var links=
        '<a href="https://search.shopping.naver.com/search/all?query='+encodeURIComponent(c.name)+'" target="_blank" rel="noopener" class="r-link">🛒 네이버 쇼핑</a>'
        +'<a href="https://www.coupang.com/np/search?q='+encodeURIComponent(c.name)+'" target="_blank" rel="noopener" class="r-link">🟡 쿠팡</a>'
        +'<a href="https://www.youtube.com/results?search_query='+encodeURIComponent(c.name+' 추천')+'" target="_blank" rel="noopener" class="r-link">▶️ 유튜브</a>'
        +'<a href="https://www.tiktok.com/search?q='+encodeURIComponent(c.name)+'" target="_blank" rel="noopener" class="r-link">🎵 틱톡</a>'
        +'<a href="https://www.instagram.com/explore/tags/'+encodeURIComponent(c.name.replace(/\s+/g,''))+'" target="_blank" rel="noopener" class="r-link">📸 인스타</a>';

      return '<div class="r-item">'
        +'<div class="r-top">'
          +'<div class="r-rank">'+(i+1)+'</div>'
          +'<div class="r-name">'+(c.name||'–')+'</div>'
          +'<div class="r-score">'+Math.round(n(sc.totalScore))+'점</div>'
        +'</div>'
        +'<div class="r-badges">'
          +bdg(TREND_LBL[tr.status]||'–',TREND_C[tr.status]||'#94a3b8',TREND_BG[tr.status]||'#f8fafc')
          +bdg(sc.grade||'–',gc,GRADE_BG[sc.grade]||'#f8fafc')
          +(sc.confidence?bdg('신뢰도 '+sc.confidence,'#475569','#f1f5f9'):'')
          +(c.velocity&&c.velocityLabel?bdg(c.velocityLabel.surge,'#6366f1','#eff0ff'):'')
        +'</div>'
        +(reason?'<div class="r-reason">'+reason+'</div>':'')
        +(c.summary?'<div style="font-size:12px;color:#1e293b;font-weight:600;margin-bottom:10px;padding:8px 10px;background:#f8fafc;border-radius:8px">💡 '+c.summary+'</div>':'')
        +'<div class="r-links">'+links+'</div>'
      +'</div>';
    }).join('')
  +'</div>';
}

// ★ trend.html에서 goHot() 클릭 시 키워드 자동 입력 + 자동 실행
window.addEventListener('DOMContentLoaded', function(){
  var kw = sessionStorage.getItem('hot-auto-kw');
  if(kw){
    sessionStorage.removeItem('hot-auto-kw');
    document.getElementById('hot-input').value = kw;
    runHot();
  }
});
</script>
</body>
</html>
