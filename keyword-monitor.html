<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>쇼핑인사이트 TOP 20</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Noto Sans KR',sans-serif;font-size:13px}
.wrap{max-width:480px;margin:40px auto;padding:0 16px}
.head{text-align:center;margin-bottom:24px}
.head h1{font-size:18px;font-weight:900;color:#fff;margin-bottom:4px}
.head p{font-size:12px;color:#475569}
.ctrl{display:flex;gap:8px;margin-bottom:16px}
.ctrl select{flex:1;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:10px 12px;border-radius:8px;font-size:13px;outline:none}
.ctrl select:focus{border-color:#6366f1}
.btn{padding:10px 20px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden}
.card-head{padding:12px 16px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:#e2e8f0}
.card-meta{font-size:11px;color:#475569}
.list{padding:4px 0}
.item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #0f172a}
.item:last-child{border-bottom:none}
.rank{width:24px;font-size:14px;font-weight:900;text-align:center;flex-shrink:0}
.r1{color:#f59e0b}.r2{color:#94a3b8}.r3{color:#b45309}.rn{color:#334155}
.name{flex:1;font-size:14px;font-weight:600}
.surge{font-size:11px;color:#475569;flex-shrink:0}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;flex-shrink:0}
.hot{background:#7f1d1d;color:#fca5a5}
.rising{background:#1c3a2a;color:#6ee7b7}
.stable{background:#1e3a5f;color:#93c5fd}
.falling{background:#1c1917;color:#78716c}
.msg{padding:32px;text-align:center;color:#475569}
@keyframes shimmer{0%,100%{opacity:.3}50%{opacity:.7}}
.sk{animation:shimmer 1s infinite;background:#334155;border-radius:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>🛍 쇼핑인사이트 인기검색어</h1>
    <p>실시간 TOP 20</p>
  </div>
  <div class="ctrl">
    <select id="cat">
      <option value="50000000">👗 패션의류</option>
      <option value="50000001">👜 패션잡화</option>
      <option value="50000002">💄 화장품/미용</option>
      <option value="50000003">📱 디지털/가전</option>
      <option value="50000004">🪑 가구/인테리어</option>
      <option value="50000005">🍱 식품</option>
      <option value="50000006">⚽ 스포츠/레저</option>
      <option value="50000007">🏠 생활/건강</option>
      <option value="50000009">🍼 출산/육아</option>
      <option value="50000010">🐾 반려동물</option>
      <option value="50000011">🚗 자동차용품</option>
    </select>
    <button class="btn" id="btn" onclick="run()">조회</button>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title" id="card-title">TOP 20</div>
      <div class="card-meta" id="card-meta"></div>
    </div>
    <div class="list" id="list">
      <div class="msg">카테고리를 선택하고 조회하세요</div>
    </div>
  </div>
</div>
<script>
var CAT={
  '50000000':'패션의류','50000001':'패션잡화','50000002':'화장품/미용',
  '50000003':'디지털/가전','50000004':'가구/인테리어','50000005':'식품',
  '50000006':'스포츠/레저','50000007':'생활/건강','50000009':'출산/육아',
  '50000010':'반려동물','50000011':'자동차용품'
};
async function run(){
  var catId=document.getElementById('cat').value;
  var btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='조회 중...';
  document.getElementById('card-title').textContent=CAT[catId]+' 인기검색어 TOP 20';
  document.getElementById('card-meta').textContent='';

  // 스켈레톤
  var sk='';
  for(var i=0;i<10;i++) sk+='<div class="item"><div class="sk" style="width:20px;height:14px"></div><div class="sk" style="flex:1;height:14px;margin-left:8px"></div></div>';
  document.getElementById('list').innerHTML=sk;

  try{
    var t=Date.now();
    var r=await fetch(window.location.origin+'/api/keyword-monitor',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'insight_top',catId:catId,period:'week'})
    });
    var d=await r.json();
    var elapsed=((Date.now()-t)/1000).toFixed(1)+'s';

    if(!d.items||!d.items.length){
      document.getElementById('list').innerHTML='<div class="msg">데이터 없음</div>';
      return;
    }

    document.getElementById('card-meta').textContent=elapsed+' · '+new Date().toLocaleTimeString('ko-KR');
    document.getElementById('list').innerHTML=d.items.map(function(item,i){
      var rank=i+1;
      var rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'rn';
      var bc=item.shopTrend==='hot'?'hot':item.shopTrend==='rising'?'rising':item.shopTrend==='stable'?'stable':'falling';
      var surge=item.surge>0?'+'+item.surge+'%':item.surge+'%';
      return '<div class="item">'
        +'<span class="rank '+rc+'">'+rank+'</span>'
        +'<span class="name">'+item.keyword+'</span>'
        +'<span class="surge">'+surge+'</span>'
        +'<span class="badge '+bc+'">'+item.shopTrend+'</span>'
      +'</div>';
    }).join('');
  }catch(e){
    document.getElementById('list').innerHTML='<div class="msg">오류: '+e.message+'</div>';
  }finally{
    btn.disabled=false; btn.textContent='조회';
  }
}
window.onload=run;
</script>
</body>
</html>
