<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>트렌드 탐색 — RealPick</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f4ff;color:#1e293b;font-family:'Noto Sans KR',sans-serif;min-height:100vh}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;height:60px;display:flex;align-items:center;padding:0 28px}
    .nav-logo{font-size:17px;font-weight:900;color:#6366f1;text-decoration:none;margin-right:32px}
    .nav-logo span{color:#1e293b}
    .nav-links{display:flex;gap:3px}
    .nav-link{padding:7px 15px;border-radius:8px;font-size:13px;font-weight:500;color:#64748b;text-decoration:none;display:inline-block;transition:all .15s}
    .nav-link:hover{background:#f1f5f9;color:#1e293b}
    .nav-link.active{background:#6366f1;color:#fff;font-weight:700}
    .nav-right{margin-left:auto}
    .nav-badge{background:#6366f1;color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700}

    /* LAYOUT */
    .page{margin-top:60px;display:flex;flex-direction:column;height:calc(100vh - 60px);overflow:hidden}

    /* 모드 탭 */
    .mode-bar{background:#fff;border-bottom:2px solid #e2e8f0;padding:0 28px;display:flex;gap:0;flex-shrink:0}
    .mode-tab{padding:14px 22px;font-size:13px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
    .mode-tab:hover{color:#6366f1}
    .mode-tab.active{color:#6366f1;border-bottom-color:#6366f1}
    .mode-badge{display:inline-block;background:#10b981;color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;margin-left:5px;vertical-align:middle}

    /* 컨트롤 */
    .controls{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 28px;flex-shrink:0}
    .ctrl-panel{display:none;flex-direction:column;gap:10px}
    .ctrl-panel.active{display:flex}
    .ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .ctrl-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
    .search-input{flex:1;max-width:380px;padding:9px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;color:#1e293b;outline:none;transition:border .15s;background:#f8fafc}
    .search-input:focus{border-color:#6366f1;background:#fff}
    .btn{padding:9px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:#6366f1;color:#fff}
    .btn-primary:hover:not(:disabled){background:#4f46e5}
    .btn-ghost{background:#f1f5f9;color:#475569}
    .btn-ghost:hover:not(:disabled){background:#e2e8f0}
    .btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}

    /* 카테고리 버튼 */
    .cat-wrap{display:flex;flex-wrap:wrap;gap:6px}
    .cat-btn{padding:5px 12px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;background:#fff;transition:all .15s}
    .cat-btn.on{border-color:#6366f1;background:#6366f1;color:#fff}

    /* 필터 바 */
    .filter-bar{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:8px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
    .filter-btn{padding:4px 12px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;background:#fff;transition:all .15s}
    .filter-btn.on{border-color:#6366f1;background:#6366f1;color:#fff}
    .sep{width:1px;height:16px;background:#e2e8f0;margin:0 2px}
    select.sort-sel{padding:5px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;color:#475569;background:#fff;outline:none;cursor:pointer}

    /* BODY */
    .body-area{display:flex;flex:1;overflow:hidden}

    /* 상세 패널 (왼쪽) */
    .detail-panel{width:300px;min-width:300px;background:#fff;border-right:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0}
    .detail-header{padding:14px 18px;border-bottom:1px solid #e2e8f0;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;position:sticky;top:0;background:#fff;z-index:5}

    /* 테이블 */
    .table-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .table-meta{padding:8px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;min-height:38px}
    .stat-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#475569;background:#f1f5f9;padding:3px 10px;border-radius:20px;font-weight:600}
    .table-rel{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
    .table-wrap{flex:1;overflow-y:auto;background:#fff}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead tr{background:#f8fafc;position:sticky;top:0;z-index:10}
    th{padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #e2e8f0;white-space:nowrap}
    .result-row{cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .1s}
    .result-row:hover{background:#f8faff}
    .result-row.sel{background:#eff0ff}
    .result-row.sel td:first-child{border-left:3px solid #6366f1}

    /* 상태 오버레이 */
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:rgba(240,244,255,.85);z-index:20}
    .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top:3px solid #6366f1;border-radius:50%;animation:spin .8s linear infinite}
    .empty-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#94a3b8;gap:10px}
    .error-wrap{padding:16px 20px}
    .error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:14px 18px;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#dc2626}

    /* 상세 내부 */
    .d-body{padding:16px}
    .d-sec{margin-bottom:18px}
    .d-lbl{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
    .d-box{background:#f8fafc;border-radius:10px;padding:12px;font-size:13px;color:#1e293b;line-height:1.6}
    .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .score-cell{background:#f8fafc;border-radius:10px;padding:12px;text-align:center}
    .score-big{font-size:20px;font-weight:900}
    .score-sub{font-size:10px;color:#94a3b8;margin-top:2px}
    .bar-item{margin-bottom:8px}
    .bar-lrow{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
    .bar-track{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#6366f1,#818cf8);transition:width .4s}
    .action-box{background:#1e293b;border-radius:10px;padding:14px}
    .kw-tags{display:flex;flex-wrap:wrap;gap:5px}
    .kw-tag{background:#eff0ff;color:#6366f1;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600}

    /* 위치추적 */
    .position-row{display:flex;gap:8px;margin-bottom:16px}
    .pos-card{flex:1;background:#f8fafc;border-radius:10px;padding:10px 12px;text-align:center;border:1px solid #e2e8f0}
    .pos-num{font-size:20px;font-weight:900;line-height:1.2}
    .pos-lbl{font-size:10px;color:#94a3b8;margin-top:2px}
    .pos-delta{font-size:11px;font-weight:700;margin-top:3px}
    .delta-up{color:#10b981}
    .delta-dn{color:#f43f5e}
    .delta-eq{color:#94a3b8}
    .rank-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:8px}
    .rank-fill{height:100%;border-radius:3px;transition:width .5s}
    .position-history{display:flex;align-items:flex-end;gap:3px;height:40px;margin-top:8px}
    .ph-bar{flex:1;border-radius:2px 2px 0 0;min-height:4px;transition:height .3s}

    /* API 바 */
    .api-bar{padding:6px 20px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0;font-size:11px;color:#94a3b8}
    .api-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

    /* 변화율 칩 */
    .rate-up{color:#10b981;font-weight:700}
    .rate-dn{color:#f43f5e;font-weight:700}
    .rate-eq{color:#94a3b8;font-weight:600}

    @media(max-width:900px){.detail-panel{display:none}}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/index.html">Real<span>Pick</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/index.html">🏠 홈</a>
    <a class="nav-link active" href="/trend.html">🔍 트렌드 탐색</a>
    <a class="nav-link" href="/ai.html">⚡ AI 추천</a>
    <a class="nav-link" href="/data.html">🗂 데이터 뷰</a>
  </div>
  <div class="nav-right"><span class="nav-badge">BETA</span></div>
</nav>

<div class="page">

  <!-- 모드 탭 -->
  <div class="mode-bar">
    <div class="mode-tab active" onclick="switchMode('category')">
      📦 카테고리 자동탐색 <span class="mode-badge">추천</span>
    </div>
    <div class="mode-tab" onclick="switchMode('rising')">
      🔥 급상승 모니터링
    </div>
    <div class="mode-tab" onclick="switchMode('seed')">
      🌱 시드 키워드 확장
    </div>
  </div>

  <!-- 컨트롤 -->
  <div class="controls">

    <!-- MODE 1: 카테고리 -->
    <div class="ctrl-panel active" id="ctrl-category">
      <div class="ctrl-row">
        <span class="ctrl-label">카테고리</span>
        <div class="cat-wrap" id="cat-wrap">
          <button class="cat-btn on" data-cat="50000003" onclick="onCat(this)">디지털/가전</button>
          <button class="cat-btn" data-cat="50000002" onclick="onCat(this)">화장품/미용</button>
          <button class="cat-btn" data-cat="50000008" onclick="onCat(this)">생활/건강</button>
          <button class="cat-btn" data-cat="50000007" onclick="onCat(this)">스포츠/레저</button>
          <button class="cat-btn" data-cat="50000006" onclick="onCat(this)">식품</button>
          <button class="cat-btn" data-cat="50000004" onclick="onCat(this)">가구/인테리어</button>
          <button class="cat-btn" data-cat="50000005" onclick="onCat(this)">출산/육아</button>
          <button class="cat-btn" data-cat="50000000" onclick="onCat(this)">패션의류</button>
          <button class="cat-btn" data-cat="50000001" onclick="onCat(this)">패션잡화</button>
        </div>
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">기간</span>
        <button class="cat-btn on" data-period="week" onclick="onPeriod(this)">이번주</button>
        <button class="cat-btn" data-period="today" onclick="onPeriod(this)">오늘</button>
        <button class="cat-btn" data-period="month" onclick="onPeriod(this)">이번달</button>
        <button id="btn-cat" class="btn btn-primary btn-sm" style="margin-left:8px" onclick="runMode()">
          🚀 자동탐색 시작
        </button>
        <button class="btn btn-ghost btn-sm" onclick="onReset()">초기화</button>
      </div>
    </div>

    <!-- MODE 2: 급상승 -->
    <div class="ctrl-panel" id="ctrl-rising">
      <div class="ctrl-row">
        <span class="ctrl-label">변화율 기준</span>
        <button class="cat-btn on" data-threshold="10" onclick="onThreshold(this)">+10% 이상</button>
        <button class="cat-btn" data-threshold="20" onclick="onThreshold(this)">+20% 이상</button>
        <button class="cat-btn" data-threshold="30" onclick="onThreshold(this)">+30% 이상</button>
        <div class="sep"></div>
        <span class="ctrl-label">감시 카테고리</span>
        <button class="cat-btn on" data-mcat="all" onclick="onMcat(this)">전체</button>
        <button class="cat-btn" data-mcat="50000003" onclick="onMcat(this)">디지털</button>
        <button class="cat-btn" data-mcat="50000002" onclick="onMcat(this)">뷰티</button>
        <button class="cat-btn" data-mcat="50000008" onclick="onMcat(this)">생활</button>
        <button id="btn-rising" class="btn btn-primary btn-sm" style="margin-left:8px" onclick="runMode()">
          🔥 급상승 탐색
        </button>
        <button class="btn btn-ghost btn-sm" onclick="onReset()">초기화</button>
      </div>
    </div>

    <!-- MODE 3: 시드 확장 -->
    <div class="ctrl-panel" id="ctrl-seed">
      <div class="ctrl-row">
        <span class="ctrl-label">시드 키워드</span>
        <input id="seed-input" class="search-input" type="text" placeholder="예: 무선 청소기" maxlength="30"
          onkeydown="if(event.key==='Enter')runMode()"/>
        <span class="ctrl-label" style="margin-left:4px">확장 깊이</span>
        <button class="cat-btn on" data-depth="1" onclick="onDepth(this)">1단계</button>
        <button class="cat-btn" data-depth="2" onclick="onDepth(this)">2단계</button>
        <button id="btn-seed" class="btn btn-primary btn-sm" onclick="runMode()">🌱 확장 탐색</button>
        <button class="btn btn-ghost btn-sm" onclick="onReset()">초기화</button>
      </div>
    </div>
  </div>

  <!-- 필터 바 -->
  <div class="filter-bar">
    <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px">트렌드</span>
    <button class="filter-btn on" data-f="all" onclick="onFilter(this,'all')">전체</button>
    <button class="filter-btn" data-f="rising" onclick="onFilter(this,'rising')">🔥 급상승</button>
    <button class="filter-btn" data-f="stable" onclick="onFilter(this,'stable')">➡️ 보합</button>
    <button class="filter-btn" data-f="new" onclick="onFilter(this,'new')">✨ 신규</button>
    <button class="filter-btn" data-f="falling" onclick="onFilter(this,'falling')">📉 하락</button>
    <div class="sep"></div>
    <span style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px">정렬</span>
    <select class="sort-sel" onchange="onSort(this.value)">
      <option value="score">점수순</option>
      <option value="rate">변화율순</option>
      <option value="count">데이터수</option>
      <option value="name">이름순</option>
    </select>
    <!-- 관련 링크 버튼 (항목 선택 시 활성화) -->
    <div id="quick-links" style="display:none;margin-left:8px;display:flex;gap:5px;align-items:center"></div>
  </div>

  <!-- 바디 -->
  <div class="body-area">

    <!-- 상세 패널 (왼쪽) -->
    <div class="detail-panel">
      <div class="detail-header">상세 분석</div>
      <div id="detail-body">
        <div class="empty-box" style="padding:40px 10px">
          <div style="font-size:36px">📋</div>
          <div style="font-size:13px;text-align:center">항목을 선택하면<br/>상세 분석이 표시됩니다</div>
        </div>
      </div>
    </div>

    <!-- 테이블 패널 -->
    <div class="table-panel">
      <div class="table-meta" id="summary-stats">
        <span class="stat-chip" style="color:#94a3b8">탐색 모드를 선택하고 시작하세요</span>
      </div>

      <div id="error-wrap" style="display:none" class="error-wrap">
        <div class="error-box">
          <span>⚠️</span>
          <span id="error-msg" style="flex:1"></span>
          <button class="btn btn-ghost btn-sm" onclick="runMode()">재시도</button>
        </div>
      </div>

      <div class="table-rel">
        <div id="loading-overlay" class="loading-overlay" style="display:none">
          <div class="spinner"></div>
          <div style="font-size:13px;color:#94a3b8" id="loading-msg">탐색 중...</div>
        </div>

        <div class="table-wrap">
          <div id="empty-state" class="empty-box">
            <div style="font-size:40px">🔍</div>
            <div style="font-size:13px">탐색 모드를 선택하고 시작하세요</div>
            <div style="font-size:11px;color:#c4cad4">카테고리 자동탐색 · 급상승 모니터링 · 시드 키워드 확장</div>
          </div>

          <table id="result-table" style="display:none">
            <thead>
              <tr>
                <th style="width:20%">제품 / 키워드</th>
                <th style="width:7%">점수</th>
                <th style="width:6%">등급</th>
                <th style="width:10%">변화율</th>
                <th style="width:11%">트렌드</th>
                <th style="width:12%">소스</th>
                <th style="width:10%">추천액션</th>
                <th>한 줄 결론</th>
              </tr>
            </thead>
            <tbody id="result-tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="api-bar" id="api-bar">
        <span>API 대기 중</span>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════
const TREND_LABEL = { rising:'🔥 급상승', stable:'➡️ 보합', falling:'📉 하락', new:'✨ 신규', unknown:'❓ 보류' };
const TREND_COLOR = { rising:'#10b981', stable:'#6366f1', falling:'#f43f5e', new:'#f59e0b', unknown:'#94a3b8' };
const GRADE_COLOR = { A:'#10b981', B:'#6366f1', C:'#94a3b8' };
const ACTION_LABEL = { shorts:'📱 Shorts', blog:'📝 블로그', hold:'⏸ 관망', compare:'🔄 비교' };
const ACTION_COLOR = { shorts:'#f59e0b', blog:'#22d3ee', hold:'#94a3b8', compare:'#a78bfa' };
const SCORE_MAX   = { shopping:25, blog:20, news:10, cafe:15, trend:30 };
const SRC_LABEL   = { shopping:'🛒 쇼핑', blog:'📝 블로그', news:'📰 뉴스', cafe:'☕ 카페', trend:'📈 트렌드' };

const CAT_NAMES = {
  '50000000':'패션의류','50000001':'패션잡화','50000002':'화장품/미용',
  '50000003':'디지털/가전','50000004':'가구/인테리어','50000005':'출산/육아',
  '50000006':'식품','50000007':'스포츠/레저','50000008':'생활/건강',
  'all':'전체',
};

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
const S = {
  mode: 'category',
  catId: '50000003', period: 'week',
  threshold: 10, mcat: 'all',
  seedKw: '', depth: 1,
  filterStatus: 'all', sortBy: 'score',
  candidates: [], filtered: [], selected: null,
  loading: false, error: null, lastUpdated: null, apiStatus: {},
};

// ════════════════════════════════════
// HELPERS
// ════════════════════════════════════
function safeNum(v, fb=0){ const n=Number(v); return isNaN(n)?fb:n; }
function fmtDate(iso){ try{ return new Date(iso).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }catch{ return '-'; } }

function rateHtml(rate){
  if(rate===null||rate===undefined) return '<span class="rate-eq">–</span>';
  const sign = rate>0?'+':'';
  if(rate>=10)  return `<span class="rate-up">${sign}${rate}%</span>`;
  if(rate<=-10) return `<span class="rate-dn">${rate}%</span>`;
  return `<span class="rate-eq">${sign}${rate}%</span>`;
}

// ════════════════════════════════════
// API CALLS
// ════════════════════════════════════
async function apiFetch(url){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 15000);
  try{
    const r = await fetch(url, {signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    return d;
  }catch(e){
    clearTimeout(t);
    if(e.name==='AbortError') throw new Error('요청 시간 초과');
    throw e;
  }
}

// ════════════════════════════════════
// MODE RUNNERS
// ════════════════════════════════════
async function runMode(){
  if(S.loading) return;
  showError(null);
  S.selected=null;

  if(S.mode==='category'){
    await runCategory();
  } else if(S.mode==='rising'){
    await runRising();
  } else {
    await runSeed();
  }
}

// MODE 1: 카테고리 자동탐색
async function runCategory(){
  setLoading(true, `카테고리 인기 키워드 수집 중... (${CAT_NAMES[S.catId]})`);
  try{
    const data = await apiFetch(
      `/api/auto-discover?mode=category&categoryId=${S.catId}&period=${S.period}`
    );
    handleResult(data);
  }catch(e){ showError(e.message); }
  finally{ setLoading(false); }
}

// MODE 2: 급상승 모니터링
async function runRising(){
  setLoading(true, `급상승 키워드 모니터링 중... (변화율 +${S.threshold}% 이상)`);
  try{
    const cats = S.mcat==='all' ? ['50000003','50000002','50000008','50000007'] : [S.mcat];
    const data = await apiFetch(
      `/api/auto-discover?mode=rising&categories=${cats.join(',')}&threshold=${S.threshold}&period=${S.period}`
    );
    handleResult(data);
  }catch(e){ showError(e.message); }
  finally{ setLoading(false); }
}

// MODE 3: 시드 키워드 확장
async function runSeed(){
  const kw = document.getElementById('seed-input').value.trim();
  if(!kw){ showError('시드 키워드를 입력해주세요'); return; }
  S.seedKw = kw;
  setLoading(true, `"${kw}" 연관 키워드 확장 중...`);
  try{
    const data = await apiFetch(
      `/api/auto-discover?mode=seed&keyword=${encodeURIComponent(kw)}&depth=${S.depth}&period=${S.period}`
    );
    handleResult(data);
  }catch(e){ showError(e.message); }
  finally{ setLoading(false); }
}

function handleResult(data){
  if(!Array.isArray(data.candidates)) throw new Error('응답 형식 오류');
  S.candidates  = data.candidates;
  S.apiStatus   = data.apiStatus   || {};
  S.lastUpdated = data.updatedAt   || new Date().toISOString();
  applySort();
  renderAll();
}

// ════════════════════════════════════
// FILTER / SORT
// ════════════════════════════════════
function applySort(){
  let list = [...S.candidates];
  if(S.filterStatus!=='all') list=list.filter(c=>c.trend&&c.trend.status===S.filterStatus);
  if(S.sortBy==='score') list.sort((a,b)=>safeNum(b.score&&b.score.totalScore)-safeNum(a.score&&a.score.totalScore));
  else if(S.sortBy==='rate') list.sort((a,b)=>{
    const ra=a.trend&&a.trend.changeRate!=null?safeNum(a.trend.changeRate):-999;
    const rb=b.trend&&b.trend.changeRate!=null?safeNum(b.trend.changeRate):-999;
    return rb-ra;
  });
  else if(S.sortBy==='count') list.sort((a,b)=>safeNum(b.count)-safeNum(a.count));
  else list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  S.filtered=list;
}

      <td style="padding:10px 14px">${rateHtml(tr.changeRate)}</td>
      <td style="padding:10px 14px;font-size:12px;font-weight:600;color:${tc}">${TREND_LABEL[tr.status]||'-'}</td>

      <td style="padding:10px 14px"><span style="background:${ac}22;color:${ac};border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700">${ACTION_LABEL[c.action]||c.action||'-'}</span></td>
      <td style="padding:10px 14px;font-size:12px;color:#64748b;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.summary||'-'}</td>

function renderDetail(){
  const panel=document.getElementById('detail-body');
  const c=S.selected;
  if(!c){ panel.innerHTML=`<div class="empty-box" style="padding:40px 10px"><div style="font-size:36px">📋</div><div style="font-size:13px;text-align:center">항목을 선택하면<br/>상세 분석이 표시됩니다</div></div>`; return; }

  const sc=c.score||{}, tr=c.trend||{}, bd=sc.breakdown||{};
  const gc=GRADE_COLOR[sc.grade]||'#94a3b8';
  const tc=TREND_COLOR[tr.status]||'#94a3b8';
  const ac=ACTION_COLOR[c.action]||'#94a3b8';

  // ── 현재 순위 계산
  const currentRank = S.filtered.findIndex(x=>x.id===c.id) + 1;
  const totalCount  = S.filtered.length;
  const rankPct     = totalCount ? Math.round((1 - (currentRank-1)/totalCount)*100) : 100;

  // ── 순위 변화 (전체 candidates 기준 score 순위 vs 현재 필터 순위)
  const globalRank  = S.candidates.sort((a,b)=>b.score.totalScore-a.score.totalScore).findIndex(x=>x.id===c.id)+1;
  const rankDelta   = null; // 실시간 추적은 세션 내 이전 순위 기록 필요 (아래 history로 처리)

  // ── 세션 내 순위 히스토리 (최대 6개 기록)
  if(!c._rankHistory) c._rankHistory=[];
  const lastRank = c._rankHistory[c._rankHistory.length-1];
  if(lastRank !== currentRank) c._rankHistory.push(currentRank);
  if(c._rankHistory.length>6) c._rankHistory.shift();
  const hist = c._rankHistory;
  const prevRank = hist.length>=2 ? hist[hist.length-2] : null;
  const delta    = prevRank!==null ? prevRank - currentRank : null; // 양수=상승

  // 순위 변화 텍스트
  const deltaHtml = delta===null
    ? '<span class="delta-eq">첫 조회</span>'
    : delta>0
      ? `<span class="delta-up">▲ ${delta}위 상승</span>`
      : delta<0
        ? `<span class="delta-dn">▼ ${Math.abs(delta)}위 하락</span>`
        : '<span class="delta-eq">── 유지</span>';

  // 히스토리 바 차트
  const maxH=hist.length?Math.max(...hist):1;
  const histBars = hist.map((r,i)=>{
    const h = Math.round((1-(r-1)/(totalCount||1))*36)+4;
    const isLast = i===hist.length-1;
    return `<div class="ph-bar" style="height:${h}px;background:${isLast?gc:'#c7d2fe'}" title="${r}위"></div>`;
  }).join('');

  // 소스별 아이템 수
  const srcCounts = {};
  (c.sampleItems||[]).forEach(i=>{ srcCounts[i.source]=(srcCounts[i.source]||0)+1; });

  const bars=Object.entries(bd).map(([k,v])=>{
    const max=SCORE_MAX[k]||25, pct=Math.round((safeNum(v)/max)*100);
    return `<div class="bar-item">
      <div class="bar-lrow"><span style="color:#64748b">${SRC_LABEL[k]||k}</span><span style="font-weight:700">${safeNum(v)} / ${max}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const kwtags=(c.keywords||[]).map(k=>`<span class="kw-tag">${k}</span>`).join('');
  const samples=(c.sampleItems||[]).map(it=>`<a href="${it.link||'#'}" target="_blank" rel="noopener" style="display:block;padding:7px 10px;background:#f8fafc;border-radius:8px;text-decoration:none;margin-bottom:5px;border:1px solid #e2e8f0">
    <div style="font-size:12px;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.title||'(제목 없음)'}</div>
    <div style="font-size:10px;color:#94a3b8;margin-top:2px">${it.source||''}</div>
  </a>`).join('');

  panel.innerHTML=`<div class="d-body">

    <!-- 헤더 -->
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:14px">
      <div style="flex:1;font-size:14px;font-weight:700;line-height:1.4">${c.name}</div>
      <span style="background:${gc}22;color:${gc};border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap">등급 ${sc.grade||'-'}</span>
    </div>

    ${kwtags?`<div class="d-sec"><div class="d-lbl">연관 키워드</div><div class="kw-tags">${kwtags}</div></div>`:''}

    <!-- 한 줄 결론 + 위치추적 나란히 -->
    <div class="d-sec">
      <div class="d-lbl">한 줄 결론 &amp; 위치 추적</div>
      <div style="display:flex;gap:8px;align-items:stretch">

        <!-- 한 줄 결론 -->
        <div style="flex:1;display:flex;flex-direction:column;gap:8px">
          <div class="d-box" style="font-size:12px">${c.summary||'-'}</div>
        </div>

        <!-- 위치 추적 카드 -->
        <div style="width:100px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 8px;text-align:center;flex-shrink:0">
          <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">위치</div>
          <div style="font-size:22px;font-weight:900;color:${gc};line-height:1">${currentRank}</div>
          <div style="font-size:10px;color:#94a3b8;margin-bottom:4px">/ ${totalCount}위</div>
          <div style="font-size:11px;font-weight:700;margin-bottom:6px">${deltaHtml}</div>
          <!-- 히스토리 미니 바 -->
          <div style="display:flex;align-items:flex-end;gap:2px;height:28px;justify-content:center">
            ${histBars||'<span style="font-size:10px;color:#cbd5e1">–</span>'}
          </div>
          <div style="font-size:9px;color:#cbd5e1;margin-top:3px">순위 히스토리</div>
          <!-- 순위 백분위 바 -->
          <div class="rank-bar" style="margin-top:6px">
            <div class="rank-fill" style="width:${rankPct}%;background:${gc}"></div>
          </div>
          <div style="font-size:9px;color:#94a3b8;margin-top:2px">상위 ${100-rankPct+1}%</div>
        </div>
      </div>
    </div>

    <!-- 스코어 그리드 -->
    <div class="score-grid">
      <div class="score-cell"><div class="score-big" style="color:${gc}">${Math.round(safeNum(sc.totalScore))}</div><div class="score-sub">종합점수</div></div>
      <div class="score-cell"><div class="score-big" style="font-size:14px;color:${tc}">${TREND_LABEL[tr.status]||'-'}</div><div class="score-sub">트렌드</div></div>
      <div class="score-cell"><div class="score-big" style="font-size:16px">${tr.changeRate!=null?rateHtml(tr.changeRate):'–'}</div><div class="score-sub">변화율 (${tr.source==='datalab'?'Datalab':'수량기반'})</div></div>
      <div class="score-cell"><div class="score-big" style="font-size:13px;color:#475569">${sc.confidence||'-'}</div><div class="score-sub">신뢰도</div></div>
    </div>

    <!-- 점수 분석 -->
    <div class="d-sec"><div class="d-lbl">점수 분석</div>${bars||'<div style="font-size:12px;color:#94a3b8">데이터 없음</div>'}</div>

    ${samples?`<div class="d-sec"><div class="d-lbl">샘플 항목</div>${samples}</div>`:''}

    <!-- 추천 액션 -->
    <div class="action-box">
      <div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">추천 액션</div>
      <div style="font-size:14px;font-weight:700;color:${ac};margin-bottom:4px">${ACTION_LABEL[c.action]||c.action||'-'}</div>
      <div style="font-size:11px;color:#64748b">소스: ${(c.sources||[]).join(', ')||'-'}</div>
    </div>
  </div>`;
}

function renderStats(){
  const el=document.getElementById('summary-stats');
  if(!S.candidates.length){ el.innerHTML=`<span class="stat-chip" style="color:#94a3b8">탐색 결과가 표시됩니다</span>`; return; }
  const rising=S.candidates.filter(c=>c.trend&&c.trend.status==='rising').length;
  const aGrade=S.candidates.filter(c=>c.score&&c.score.grade==='A').length;
  const total=S.candidates.length;
  const avg=total?Math.round(S.candidates.reduce((s,c)=>s+safeNum(c.score&&c.score.totalScore),0)/total):0;
  const modeLabel={category:'카테고리 탐색',rising:'급상승 모니터링',seed:`"${S.seedKw}" 확장`};
  el.innerHTML=`
    <span class="stat-chip">🔍 ${modeLabel[S.mode]||''}</span>
    <span class="stat-chip">📦 ${total}개 후보</span>
    <span class="stat-chip">🔥 급상승 ${rising}개</span>
    <span class="stat-chip">🏆 A등급 ${aGrade}개</span>
    <span class="stat-chip">📊 평균 ${avg}점</span>
    ${S.lastUpdated?`<span class="stat-chip" style="margin-left:auto;color:#94a3b8">🕐 ${fmtDate(S.lastUpdated)}</span>`:''}
  `;
}

function renderApiBar(){
  const el=document.getElementById('api-bar');
  const s=S.apiStatus;
  const keys=['shopping','blog','news','cafe','datalab'];
  const labels={shopping:'쇼핑',blog:'블로그',news:'뉴스',cafe:'카페',datalab:'Datalab'};
  el.innerHTML=keys.filter(k=>k in s).map(k=>{
    const ok=s[k]==='fulfilled';
    return `<span><span class="api-dot" style="background:${ok?'#34d399':s[k]?'#f43f5e':'#cbd5e1'}"></span><span style="color:${ok?'#475569':'#94a3b8'}">${labels[k]}</span></span>`;
  }).join('')||'<span>API 대기 중</span>';
}

// ════════════════════════════════════
// UI CONTROL
// ════════════════════════════════════
function setLoading(on, msg=''){
  S.loading=on;
  document.getElementById('loading-overlay').style.display=on?'flex':'none';
  if(msg) document.getElementById('loading-msg').textContent=msg;
  const btns=['btn-cat','btn-rising','btn-seed'];
  btns.forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=on;});
}

function showError(msg){
  S.error=msg;
  document.getElementById('error-wrap').style.display=msg?'block':'none';
  if(msg) document.getElementById('error-msg').textContent=msg;
}

function onReset(){
  S.candidates=[];S.filtered=[];S.selected=null;S.apiStatus={};S.lastUpdated=null;
  showError(null);
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('result-table').style.display='none';
  renderDetail();renderStats();renderApiBar();
}

function selectItem(i){
  S.selected=S.filtered[i]||null;
  renderTable();renderDetail();
}

function switchMode(m){
  S.mode=m;S.selected=null;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>{
    t.classList.toggle('active',['category','rising','seed'][i]===m);
  });
  document.querySelectorAll('.ctrl-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('ctrl-'+m).classList.add('active');
  onReset();
}

function onCat(el){
  document.querySelectorAll('[data-cat]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); S.catId=el.dataset.cat;
}
function onPeriod(el){
  document.querySelectorAll('[data-period]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); S.period=el.dataset.period;
}
function onThreshold(el){
  document.querySelectorAll('[data-threshold]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); S.threshold=Number(el.dataset.threshold);
}
function onMcat(el){
  document.querySelectorAll('[data-mcat]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); S.mcat=el.dataset.mcat;
}
function onDepth(el){
  document.querySelectorAll('[data-depth]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); S.depth=Number(el.dataset.depth);
}
function onFilter(el,val){
  document.querySelectorAll('[data-f]').forEach(b=>b.classList.remove('on'));
  el.classList.add('on'); S.filterStatus=val; S.selected=null;
  applySort();renderTable();renderDetail();
}
function onSort(val){ S.sortBy=val; applySort(); renderTable(); }
</script>
