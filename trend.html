<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>트렌드 탐색 — RealPick</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f0f4ff;color:#1e293b;font-family:'Noto Sans KR',sans-serif;min-height:100vh}

    /* ── NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid #e2e8f0;height:60px;display:flex;align-items:center;padding:0 28px;gap:0}
    .nav-logo{font-size:17px;font-weight:900;color:#6366f1;text-decoration:none;margin-right:32px;white-space:nowrap}
    .nav-logo span{color:#1e293b}
    .nav-links{display:flex;gap:3px}
    .nav-link{padding:7px 15px;border-radius:8px;font-size:13px;font-weight:500;color:#64748b;text-decoration:none;display:inline-block;transition:all .15s;border:none;background:transparent;cursor:pointer}
    .nav-link:hover{background:#f1f5f9;color:#1e293b}
    .nav-link.active{background:#6366f1;color:#fff;font-weight:700}
    .nav-right{margin-left:auto}
    .nav-badge{background:#6366f1;color:#fff;font-size:10px;padding:3px 10px;border-radius:20px;font-weight:700}

    /* ── LAYOUT */
    .page{margin-top:60px;display:flex;flex-direction:column;height:calc(100vh - 60px);overflow:hidden}

    /* ── 상단 컨트롤 */
    .controls{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 28px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
    .controls-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .page-title{font-size:16px;font-weight:800;color:#1e293b;white-space:nowrap}
    .search-wrap{display:flex;gap:8px;flex:1;max-width:480px}
    .search-input{flex:1;padding:9px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;color:#1e293b;outline:none;transition:border .15s;background:#f8fafc}
    .search-input:focus{border-color:#6366f1;background:#fff}
    .btn{padding:9px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:#6366f1;color:#fff}
    .btn-primary:hover:not(:disabled){background:#4f46e5}
    .btn-ghost{background:#f1f5f9;color:#475569}
    .btn-ghost:hover:not(:disabled){background:#e2e8f0}
    .btn-danger{background:#fef2f2;color:#ef4444}

    /* 필터 */
    .filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .filter-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
    .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:12px;font-weight:600;color:#64748b;cursor:pointer;background:#fff;transition:all .15s}
    .filter-btn.on{border-color:#6366f1;background:#6366f1;color:#fff}
    .filter-btn:hover:not(.on){border-color:#6366f1;color:#6366f1}
    .sep{width:1px;height:16px;background:#e2e8f0;margin:0 4px}
    select.sort-select{padding:5px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;color:#475569;cursor:pointer;background:#fff;outline:none}
    select.sort-select:focus{border-color:#6366f1}

    /* ── BODY AREA */
    .body-area{display:flex;flex:1;overflow:hidden}

    /* ── TABLE PANEL */
    .table-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .table-meta{padding:10px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0}
    .stat-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#475569;background:#f1f5f9;padding:3px 10px;border-radius:20px;font-weight:600}
    .table-wrap{flex:1;overflow-y:auto;background:#fff}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead tr{background:#f8fafc;position:sticky;top:0;z-index:10}
    th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;border-bottom:1px solid #e2e8f0}
    .result-row{cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .1s}
    .result-row:hover{background:#f8faff}
    .result-row.selected{background:#eff0ff}
    .result-row.selected td:first-child{border-left:3px solid #6366f1}

    /* ── DETAIL PANEL */
    .detail-panel{width:320px;min-width:320px;background:#fff;border-right:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0}
    .detail-header{padding:16px 18px;border-bottom:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;position:sticky;top:0;background:#fff;z-index:5}
    .detail-body{padding:18px}
    .d-section{margin-bottom:20px}
    .d-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
    .d-box{background:#f8fafc;border-radius:10px;padding:12px}
    .score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .score-cell{background:#f8fafc;border-radius:10px;padding:12px;text-align:center}
    .score-big{font-size:22px;font-weight:900}
    .score-sub{font-size:10px;color:#94a3b8;margin-top:2px}
    .bar-item{margin-bottom:8px}
    .bar-label-row{display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px}
    .bar-track{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#6366f1,#818cf8);transition:width .4s}
    .sample-link{display:block;padding:8px 10px;background:#f8fafc;border-radius:8px;text-decoration:none;margin-bottom:5px;border:1px solid #e2e8f0;transition:border .15s}
    .sample-link:hover{border-color:#6366f1}
    .sample-title{font-size:12px;color:#1e293b;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sample-src{font-size:10px;color:#94a3b8;margin-top:2px}
    .action-box{background:#1e293b;border-radius:10px;padding:14px}
    .action-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
    .action-meta{font-size:11px;color:#64748b}

    /* ── STATUS STATES */
    .status-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;pointer-events:none}
    .table-relative{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top:3px solid #6366f1;border-radius:50%;animation:spin .8s linear infinite}
    .status-text{font-size:13px;color:#94a3b8}
    .error-box{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:16px 20px;margin:20px;display:flex;align-items:flex-start;gap:12px}
    .error-msg{font-size:13px;color:#dc2626;flex:1;line-height:1.5}

    /* ── API STATUS */
    .api-bar{padding:8px 20px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:16px;flex-wrap:wrap;flex-shrink:0;font-size:11px;color:#94a3b8}
    .api-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

    /* ── EMPTY */
    .empty-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#94a3b8;gap:10px}
    .empty-icon{font-size:40px}
    .empty-text{font-size:13px}

    @media(max-width:900px){.detail-panel{display:none}}
    @media(max-width:600px){.controls-row{flex-direction:column;align-items:stretch}.search-wrap{max-width:100%}}
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <a class="nav-logo" href="/index.html">Real<span>Pick</span></a>
  <div class="nav-links">
    <a class="nav-link" href="/index.html">🏠 홈</a>
    <a class="nav-link active" href="/trend.html">🔍 트렌드 탐색</a>
    <a class="nav-link" href="/ai.html">⚡ AI 추천</a>
    <a class="nav-link" href="/data.html">🗂 데이터 뷰</a>
  </div>
  <div class="nav-right"><span class="nav-badge">BETA</span></div>
</nav>

<!-- ── PAGE ── -->
<div class="page">

  <!-- 컨트롤 -->
  <div class="controls">
    <div class="controls-row">
      <div class="page-title">🔍 트렌드 탐색</div>
      <div class="search-wrap">
        <input id="kw-input" class="search-input" type="text" placeholder="키워드 입력 (비우면 자동 탐색)" maxlength="50"
          onkeydown="if(event.key==='Enter')onDiscover()"/>
        <button id="btn-discover" class="btn btn-primary" onclick="onDiscover()">🔍 자동 탐색</button>
        <button class="btn btn-ghost" onclick="onReset()">초기화</button>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">기간</span>
      <button class="filter-btn on" data-period="week" onclick="onPeriod(this,'week')">이번주</button>
      <button class="filter-btn" data-period="today" onclick="onPeriod(this,'today')">오늘</button>
      <button class="filter-btn" data-period="month" onclick="onPeriod(this,'month')">이번달</button>
      <div class="sep"></div>
      <span class="filter-label">트렌드</span>
      <button class="filter-btn on" data-filter="all" onclick="onFilter(this,'all')">전체</button>
      <button class="filter-btn" data-filter="rising" onclick="onFilter(this,'rising')">🔥 급상승</button>
      <button class="filter-btn" data-filter="stable" onclick="onFilter(this,'stable')">➡️ 보합</button>
      <button class="filter-btn" data-filter="new" onclick="onFilter(this,'new')">✨ 신규</button>
      <button class="filter-btn" data-filter="falling" onclick="onFilter(this,'falling')">📉 하락</button>
      <div class="sep"></div>
      <span class="filter-label">정렬</span>
      <select class="sort-select" onchange="onSort(this.value)">
        <option value="score">점수순</option>
        <option value="count">데이터수</option>
        <option value="name">이름순</option>
      </select>
    </div>
  </div>

  <!-- 바디 -->
  <div class="body-area">

    <!-- 상세 패널 (왼쪽) -->
    <div class="detail-panel">
      <div class="detail-header">상세 분석</div>
      <div class="detail-body" id="detail-body">
        <div class="empty-box" style="padding:40px 10px">
          <div class="empty-icon">📋</div>
          <div class="empty-text" style="text-align:center">테이블에서 항목을 선택하면<br/>상세 분석이 표시됩니다</div>
        </div>
      </div>
    </div>

    <!-- 테이블 패널 -->
    <div class="table-panel">

      <!-- 요약 통계 -->
      <div class="table-meta" id="summary-stats">
        <span class="stat-chip" style="color:#94a3b8">탐색 결과가 여기에 표시됩니다</span>
      </div>

      <!-- 에러 -->
      <div id="error-box" style="display:none">
        <div class="error-box">
          <div>⚠️</div>
          <div class="error-msg" id="error-msg">오류가 발생했습니다.</div>
          <button class="btn btn-ghost" style="padding:6px 12px;font-size:12px" onclick="onRetry()">재시도</button>
        </div>
      </div>

      <!-- 테이블 -->
      <div class="table-relative">
        <!-- 로딩 -->
        <div id="loading-state" style="display:none" class="status-overlay" style="pointer-events:all;background:rgba(240,244,255,.8);z-index:20">
          <div class="spinner"></div>
          <div class="status-text" id="loading-msg">네이버 API 수집 중...</div>
        </div>

        <div class="table-wrap">
          <!-- 빈 상태 -->
          <div id="empty-state" class="empty-box">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">키워드를 입력하거나 자동 탐색을 눌러주세요</div>
            <div style="font-size:11px;color:#c4cad4">쇼핑 · 블로그 · 뉴스 · 카페 데이터를 동시에 수집합니다</div>
          </div>

          <table id="result-table" style="display:none">
            <thead>
              <tr>
                <th style="width:28%">제품명</th>
                <th style="width:7%">점수</th>
                <th style="width:6%">등급</th>
                <th style="width:11%">트렌드</th>
                <th style="width:14%">소스</th>
                <th style="width:11%">추천액션</th>
                <th>한 줄 결론</th>
              </tr>
            </thead>
            <tbody id="result-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- API 상태 바 -->
      <div class="api-bar" id="api-bar">
        <span>API 상태: 대기 중</span>
      </div>
    </div>

    <!-- 상세 패널 닫기 제거 (왼쪽으로 이동됨) -->

  </div>
</div>

<script>
// ════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════
const TREND_STATUS_LABEL = {
  rising:  '🔥 급상승',
  stable:  '➡️ 보합',
  falling: '📉 하락',
  new:     '✨ 신규',
  unknown: '❓ 보류',
};
const TREND_STATUS_COLOR = {
  rising: '#10b981', stable: '#6366f1',
  falling: '#f43f5e', new: '#f59e0b', unknown: '#94a3b8',
};
const GRADE_COLOR = { A: '#10b981', B: '#6366f1', C: '#94a3b8' };
const ACTION_LABEL = {
  shorts:  '📱 Shorts 추천',
  blog:    '📝 블로그 추천',
  hold:    '⏸ 관망',
  compare: '🔄 비교 검토',
};
const ACTION_COLOR = {
  shorts: '#f59e0b', blog: '#22d3ee', hold: '#94a3b8', compare: '#a78bfa',
};
const SCORE_MAX = { shopping: 25, blog: 20, news: 10, cafe: 15, trend: 30 };
const SCORE_SOURCE_LABEL = {
  shopping: '🛒 쇼핑', blog: '📝 블로그',
  news: '📰 뉴스', cafe: '☕ 카페', trend: '📈 트렌드',
};

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
const S = {
  candidates: [],   // 원본 데이터
  filtered:   [],   // 필터/정렬 적용 후
  selected:   null, // 선택된 항목
  loading:    false,
  error:      null,
  keyword:    '',
  sortBy:     'score',
  filterStatus: 'all',
  lastUpdated: null,
  apiStatus:   {},
};

// ════════════════════════════════════════
// VALIDATORS
// ════════════════════════════════════════
function validateKeyword(kw) {
  if (typeof kw !== 'string') return false;
  const t = kw.trim();
  return t.length >= 0 && t.length <= 50; // 빈 값 허용 (자동 탐색)
}

// ════════════════════════════════════════
// FORMATTERS
// ════════════════════════════════════════
function fmtDate(iso) {
  if (!iso) return '-';
  try {
    return new Date(iso).toLocaleString('ko-KR', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
    });
  } catch { return '-'; }
}
function fmtSources(arr) {
  return Array.isArray(arr) ? arr.join(', ') : '-';
}
function safeNum(v, fallback = 0) {
  const n = Number(v);
  return isNaN(n) ? fallback : n;
}

// ════════════════════════════════════════
// API
// ════════════════════════════════════════
async function fetchDiscover(keyword) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 12000);
  try {
    const kw = keyword.trim() || '인기상품';
    const res = await fetch(
      `/api/discover?keyword=${encodeURIComponent(kw)}&display=20&period=${S.period}`,
      { signal: ctrl.signal }
    );
    clearTimeout(timer);
    if (!res.ok) throw new Error(`서버 오류 (HTTP ${res.status})`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('요청 시간 초과 (12초)');
    throw e;
  }
}

// ════════════════════════════════════════
// DATA PROCESSING
// ════════════════════════════════════════
function applyFiltersAndSort() {
  let list = [...S.candidates];

  // 트렌드 필터
  if (S.filterStatus !== 'all') {
    list = list.filter(c => (c.trend && c.trend.status) === S.filterStatus);
  }

  // 정렬
  if (S.sortBy === 'score') {
    list.sort((a, b) => safeNum(b.score && b.score.totalScore) - safeNum(a.score && a.score.totalScore));
  } else if (S.sortBy === 'count') {
    list.sort((a, b) => safeNum(b.count) - safeNum(a.count));
  } else if (S.sortBy === 'name') {
    list.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  }

  S.filtered = list;
}

// ════════════════════════════════════════
// RENDER — 테이블
// ════════════════════════════════════════
function renderTable() {
  const tbody    = document.getElementById('result-tbody');
  const table    = document.getElementById('result-table');
  const emptyBox = document.getElementById('empty-state');

  if (!S.filtered.length) {
    table.style.display = 'none';
    emptyBox.style.display = 'flex';
    return;
  }
  emptyBox.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = S.filtered.map((c, i) => {
    const score      = c.score  || {};
    const trend      = c.trend  || {};
    const trendColor = TREND_STATUS_COLOR[trend.status]  || '#94a3b8';
    const gradeColor = GRADE_COLOR[score.grade]           || '#94a3b8';
    const actColor   = ACTION_COLOR[c.action]             || '#94a3b8';
    const isSel      = S.selected && S.selected.id === c.id;
    const keywords   = Array.isArray(c.keywords) ? c.keywords.slice(0,3).join(' · ') : '';
    const sources    = Array.isArray(c.sources) ? c.sources : [];

    return `<tr class="result-row${isSel ? ' selected' : ''}" onclick="selectCandidate(${i})">
      <td style="padding:11px 14px">
        <div style="font-weight:600;color:#1e293b;font-size:13px">${c.name || '-'}</div>
        ${keywords ? `<div style="font-size:11px;color:#94a3b8;margin-top:3px">${keywords}</div>` : ''}
      </td>
      <td style="padding:11px 14px;font-weight:800;font-size:15px;color:${gradeColor}">${Math.round(safeNum(score.totalScore))}</td>
      <td style="padding:11px 14px">
        <span style="background:${gradeColor}22;color:${gradeColor};border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700">${score.grade || '-'}</span>
      </td>
      <td style="padding:11px 14px;font-size:12px;font-weight:600;color:${trendColor}">
        ${TREND_STATUS_LABEL[trend.status] || '-'}
      </td>
      <td style="padding:11px 14px">
        <div style="display:flex;gap:3px;flex-wrap:wrap">
          ${sources.map(s => `<span style="background:#f1f5f9;color:#475569;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:600">${s}</span>`).join('')}
        </div>
      </td>
      <td style="padding:11px 14px">
        <span style="background:${actColor}22;color:${actColor};border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700">
          ${ACTION_LABEL[c.action] || c.action || '-'}
        </span>
      </td>
      <td style="padding:11px 14px;font-size:12px;color:#64748b;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${c.summary || '-'}
      </td>
    </tr>`;
  }).join('');
}

// ════════════════════════════════════════
// RENDER — 상세 패널
// ════════════════════════════════════════
function renderDetail() {
  const panel = document.getElementById('detail-body');
  const c = S.selected;

  if (!c) {
    panel.innerHTML = `<div class="empty-box" style="padding:40px 10px">
      <div class="empty-icon">📋</div>
      <div class="empty-text" style="text-align:center">테이블에서 항목을 선택하면<br/>상세 분석이 표시됩니다</div>
    </div>`;
    return;
  }

  const score     = c.score     || {};
  const trend     = c.trend     || {};
  const breakdown = score.breakdown || {};
  const tc = TREND_STATUS_COLOR[trend.status] || '#94a3b8';
  const gc = GRADE_COLOR[score.grade]          || '#94a3b8';
  const ac = ACTION_COLOR[c.action]             || '#94a3b8';

  // breakdown 바
  const bars = Object.entries(breakdown).map(([k, v]) => {
    const max = SCORE_MAX[k] || 25;
    const pct = Math.round((safeNum(v) / max) * 100);
    return `<div class="bar-item">
      <div class="bar-label-row">
        <span style="color:#64748b">${SCORE_SOURCE_LABEL[k] || k}</span>
        <span style="font-weight:700;color:#1e293b">${safeNum(v)} / ${max}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // 샘플 링크
  const samples = Array.isArray(c.sampleItems) ? c.sampleItems
    .map(item => `<a class="sample-link" href="${item.link || '#'}" target="_blank" rel="noopener">
      <div class="sample-title">${item.title || '(제목 없음)'}</div>
      <div class="sample-src">${item.source || ''}</div>
    </a>`).join('') : '';

  panel.innerHTML = `
    <!-- 헤더 -->
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:16px">
      <div style="flex:1;font-size:14px;font-weight:700;color:#1e293b;line-height:1.4">${c.name}</div>
      <span style="background:${gc}22;color:${gc};border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;white-space:nowrap">등급 ${score.grade || '-'}</span>
    </div>

    <!-- 한 줄 결론 -->
    <div class="d-section">
      <div class="d-label">한 줄 결론</div>
      <div class="d-box" style="background:#f0f4ff;font-size:13px;color:#1e293b;line-height:1.6">${c.summary || '-'}</div>
    </div>

    <!-- 스코어 그리드 -->
    <div class="score-grid">
      <div class="score-cell">
        <div class="score-big" style="color:${gc}">${Math.round(safeNum(score.totalScore))}</div>
        <div class="score-sub">종합 점수</div>
      </div>
      <div class="score-cell">
        <div class="score-big" style="font-size:16px;color:${tc}">${TREND_STATUS_LABEL[trend.status] || '-'}</div>
        <div class="score-sub">트렌드 상태</div>
      </div>
      <div class="score-cell">
        <div class="score-big" style="font-size:15px;color:#475569">${safeNum(c.count)}</div>
        <div class="score-sub">수집 데이터</div>
      </div>
      <div class="score-cell">
        <div class="score-big" style="font-size:14px;color:#475569">${score.confidence || '-'}</div>
        <div class="score-sub">신뢰도</div>
      </div>
    </div>

    <!-- 점수 분석 -->
    <div class="d-section">
      <div class="d-label">점수 분석</div>
      ${bars || '<div style="font-size:12px;color:#94a3b8">데이터 없음</div>'}
    </div>

    <!-- 샘플 -->
    ${samples ? `<div class="d-section">
      <div class="d-label">관련 항목 샘플</div>
      ${samples}
    </div>` : ''}

    <!-- 추천 액션 -->
    <div class="action-box">
      <div style="font-size:10px;color:#64748b;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">추천 액션</div>
      <div class="action-name" style="color:${ac}">${ACTION_LABEL[c.action] || c.action || '-'}</div>
      <div class="action-meta">소스: ${fmtSources(c.sources)} · 신뢰도: ${score.confidence || '-'}</div>
    </div>
  `;
}

// ════════════════════════════════════════
// RENDER — 요약 통계
// ════════════════════════════════════════
function renderStats() {
  const el = document.getElementById('summary-stats');
  if (!S.candidates.length) {
    el.innerHTML = `<span class="stat-chip" style="color:#94a3b8">탐색 결과가 여기에 표시됩니다</span>`;
    return;
  }
  const rising   = S.candidates.filter(c => c.trend && c.trend.status === 'rising').length;
  const aGrade   = S.candidates.filter(c => c.score && c.score.grade === 'A').length;
  const total    = S.candidates.length;
  const avg      = total ? Math.round(S.candidates.reduce((s, c) => s + safeNum(c.score && c.score.totalScore), 0) / total) : 0;
  el.innerHTML = `
    <span class="stat-chip">📦 총 ${total}개 후보</span>
    <span class="stat-chip">🔥 급상승 ${rising}개</span>
    <span class="stat-chip">🏆 A등급 ${aGrade}개</span>
    <span class="stat-chip">📊 평균 ${avg}점</span>
    ${S.lastUpdated ? `<span class="stat-chip" style="margin-left:auto;color:#94a3b8">🕐 ${fmtDate(S.lastUpdated)}</span>` : ''}
  `;
}

// ════════════════════════════════════════
// RENDER — API 상태 바
// ════════════════════════════════════════
function renderApiBar() {
  const el = document.getElementById('api-bar');
  const s = S.apiStatus;
  const keys = ['shopping', 'blog', 'news', 'cafe'];
  const labels = { shopping: '쇼핑', blog: '블로그', news: '뉴스', cafe: '카페' };
  el.innerHTML = keys.map(k => {
    const ok = s[k] === 'fulfilled';
    return `<span style="display:inline-flex;align-items:center">
      <span class="api-dot" style="background:${ok ? '#34d399' : s[k] ? '#f43f5e' : '#cbd5e1'}"></span>
      <span style="color:${ok ? '#475569' : '#94a3b8'}">${labels[k]}</span>
    </span>`;
  }).join('') + (S.keyword ? `<span style="margin-left:auto;color:#6366f1;font-weight:600">키워드: ${S.keyword}</span>` : '');
}

// ════════════════════════════════════════
// UI 상태 제어
// ════════════════════════════════════════
function setLoading(on) {
  S.loading = on;
  const overlay = document.getElementById('loading-state');
  const btn     = document.getElementById('btn-discover');
  overlay.style.display = on ? 'flex' : 'none';
  if (on) overlay.style.pointerEvents = 'all';
  btn.disabled    = on;
  btn.textContent = on ? '분석 중...' : '🔍 자동 탐색';
}

function showError(msg) {
  S.error = msg;
  const box = document.getElementById('error-box');
  const txt = document.getElementById('error-msg');
  box.style.display = msg ? 'block' : 'none';
  if (msg && txt) txt.textContent = msg;
}

// ════════════════════════════════════════
// EVENT HANDLERS
// ════════════════════════════════════════
function selectCandidate(idx) {
  S.selected = S.filtered[idx] || null;
  renderTable();
  renderDetail();
}

// 기간 필터
function onPeriod(el, val) {
  document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  S.period = val;
}

function onFilter(el, val) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  S.filterStatus = val;
  S.selected = null;
  applyFiltersAndSort();
  renderTable();
  renderDetail();
}

function onSort(val) {
  S.sortBy = val;
  applyFiltersAndSort();
  renderTable();
}

function onReset() {
  S.candidates = [];
  S.filtered   = [];
  S.selected   = null;
  S.apiStatus  = {};
  S.lastUpdated = null;
  document.getElementById('kw-input').value = '';
  showError(null);
  renderTable();
  renderDetail();
  renderStats();
  renderApiBar();
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('result-table').style.display = 'none';
}

function onRetry() {
  showError(null);
  onDiscover();
}

async function onDiscover() {
  const kw = document.getElementById('kw-input').value;
  if (!validateKeyword(kw)) {
    showError('키워드는 50자 이내로 입력해주세요');
    return;
  }
  showError(null);
  S.keyword  = kw.trim() || '인기상품';
  S.selected = null;
  setLoading(true);
  document.getElementById('loading-msg').textContent = `"${S.keyword}" 탐색 중 — 쇼핑 · 블로그 · 뉴스 · 카페 수집 중...`;

  try {
    const data = await fetchDiscover(S.keyword);

    if (!Array.isArray(data.candidates)) throw new Error('응답 형식 오류');

    S.candidates  = data.candidates;
    S.apiStatus   = data.apiStatus   || {};
    S.lastUpdated = data.updatedAt   || new Date().toISOString();

    applyFiltersAndSort();
    renderTable();
    renderDetail();
    renderStats();
    renderApiBar();

  } catch (e) {
    console.error('[discover error]', e);
    showError('탐색 실패: ' + (e.message || '알 수 없는 오류'));
  } finally {
    setLoading(false);
  }
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderDetail();
  renderApiBar();
});
</script>

</body>
</html>
